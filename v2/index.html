<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The List · Prototype v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<style>
  /* Kit V.2 — dark = Warm Cream Scale (primary), light = Anthracite Scale.
     Var names kept (--ice etc.) so call sites don't churn; --ice is now the
     monochrome accent: warm cream on dark, brand anthracite on light. */
  :root{
    --bg:        #121315;
    --bg-elev:   #1B1C1F;
    --bg-elev2:  #232428;
    --ink:       #F7F6F3;
    --ink-2:     #EDECE6;
    --ink-mute:  #D8D4C7;
    --line:      rgba(247,246,243,0.10);
    --line-2:    rgba(247,246,243,0.18);
    --ice:       #F7F6F3;
    --ice-dim:   #D8D4C7;
    --ice-ink:   #121315;
    --page:      #0D0E10;
  }
  html.light{
    --bg:        #F7F6F3;
    --bg-elev:   #FFFFFF;
    --bg-elev2:  #ECEAE3;
    --ink:       #1E1E1E;
    --ink-2:     #454B52;
    --ink-mute:  #6A737D;
    --line:      rgba(30,30,30,0.08);
    --line-2:    rgba(30,30,30,0.15);
    --ice:       #2A2D31;
    --ice-dim:   #454B52;
    --ice-ink:   #FFFFFF;
    --page:      #F2F0EB;
  }
  html, body {
    background: var(--page);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }
  /* Two families: Cormorant Garamond 600 for display (screen titles, event /
     venue names, reveal moments), Plus Jakarta Sans for everything else.
     Doubled selector (.font-black.font-black) so it beats Tailwind CDN's own
     .font-black utility, which otherwise forces font-weight:900. */
  .font-black.font-black,
  .font-display {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .font-display-l {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  /* font-mono = legacy class for numbers/timers. Numbers set in Plus Jakarta
     Sans 600 with tabular figures so timers don't jitter. Doubled selector
     (.font-mono.font-mono) so it beats Tailwind CDN's own .font-mono utility,
     which otherwise forces a system monospace stack. Declared after .font-black
     so number tiles that carry both classes stay sans. */
  .font-mono.font-mono {
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }

  /* hide scrollbars inside phone screens */
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width: none; }

  /* iphone bezel */
  .iphone {
    width: 393px; height: 852px;
    border-radius: 54px;
    padding: 11px;
    background: linear-gradient(140deg,#2a2722 0%, #0c0a08 45%, #1d1a16 100%);
    box-shadow:
      inset 0 0 0 1.5px #3a3631,
      inset 0 0 0 3px #0a0807,
      0 60px 80px -40px rgba(0,0,0,.9),
      0 30px 60px -30px rgba(0,0,0,.6);
    position: relative;
  }
  .iphone-screen {
    width: 100%; height: 100%; border-radius: 43px;
    overflow: hidden; position: relative; background: var(--bg);
    isolation: isolate;
  }
  .island { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#000; border-radius:20px; z-index:50; }

  .statusbar { position:absolute; top:0; left:0; right:0; height:54px; padding: 16px 28px 0; display:flex; justify-content:space-between; align-items:flex-start; z-index:40; font-family:'Plus Jakarta Sans', sans-serif; font-weight:600; font-variant-numeric: tabular-nums; font-size:14px; color: var(--ink); pointer-events:none; }
  .statusbar svg { width: 16px; height: 16px; }

  .tabbar {
    position:absolute; left:0; right:0; bottom:0; height: 88px;
    padding: 12px 18px 30px;
    display:grid; grid-template-columns:repeat(4,1fr); gap: 4px;
    background: linear-gradient(180deg, rgba(18,19,21,0) 0%, rgba(18,19,21,.72) 45%, rgba(18,19,21,.92) 100%);
    backdrop-filter: blur(22px) saturate(1.3);
    -webkit-backdrop-filter: blur(22px) saturate(1.3);
    z-index: 30;
    border-top: 1px solid var(--line);
    box-shadow: 0 -12px 34px -22px rgba(0,0,0,.55);
  }
  html.light .tabbar {
    background: linear-gradient(180deg, rgba(247,246,243,0) 0%, rgba(247,246,243,.72) 45%, rgba(247,246,243,.92) 100%);
    box-shadow: 0 -12px 34px -22px rgba(30,30,30,.18);
  }
  .tabbar button {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px; color: var(--ink-mute);
    font-size: 10px; letter-spacing: 0.01em;
    padding: 4px 0; border-radius: 14px;
    transition: color .15s;
    background: transparent; border: 0; cursor: pointer;
  }
  .tabbar button.active { color: var(--ink); }
  .tabbar button.active svg { color: var(--ice); }

  .hr { height: 1px; background: var(--line); }
  .hr-2 { height: 1px; background: var(--line-2); }

  .stamp { font-family:'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 0.01em; color: var(--ink-mute); }
  .smallcaps { letter-spacing: 0.01em; font-size: 10px; font-weight: 500; }
  /* Calmer section marker — sentence case, no tracking.
     Used for section dividers; .stamp stays for true value labels (When/Doors/Seats). */
  .section-label { font-family:'Plus Jakarta Sans', ui-sans-serif, system-ui; font-weight: 700; font-size: 14px; letter-spacing: normal; color: var(--ink-2); }
  /* Brand mark eyebrows ("The List · No. 048", "The List · invitation") sit in
     the serif so the wordmark reads as a wordmark. Declared after .stamp so
     "stamp wordmark" call sites resolve to the serif. */
  .wordmark { font-family:'Cormorant Garamond', Georgia, serif; font-weight: 600; font-size: 13px; letter-spacing: 0.01em; }

  .chip-ice { background: var(--ice); color: var(--ice-ink); }
  .chip-outline { border: 1px solid var(--line-2); color: var(--ink); }

  .press { transition: transform .12s ease, opacity .12s ease, background .2s, border-color .2s, box-shadow .2s; cursor: pointer; }
  @media (hover:hover){ .press:hover { opacity: .96; } }
  .press:active { transform: scale(.97); opacity: .85; }

  .vt { writing-mode: vertical-rl; transform: rotate(180deg); }

  /* film grain */
  .grain::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: overlay;
    pointer-events: none;
  }

  .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(247,246,243,.03), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(247,246,243,.02), transparent 60%),
      var(--page);
  }
  html.light .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(42,45,49,.05), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(42,45,49,.03), transparent 60%),
      var(--page);
  }

  .theme-toggle {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display:flex; align-items:center; gap:8px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--line-2);
    color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500;
    font-size: 11px; letter-spacing: 0.01em;
    cursor: pointer; transition: all .2s;
  }
  .theme-toggle:hover { border-color: var(--ice); color: var(--ice); }
  .theme-toggle .dot { width:6px; height:6px; border-radius:50%; background: var(--ice); }

  @keyframes pulseIce {
    0% { box-shadow: 0 0 0 0 rgba(247,246,243,.3); }
    100% { box-shadow: 0 0 0 28px rgba(247,246,243,0); }
  }
  .pulse-ice { animation: pulseIce 1.8s cubic-bezier(.4,.2,.2,1) infinite; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .anim-up { animation: slideUp .5s cubic-bezier(.2,.7,.2,1); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .anim-fade { animation: fadeIn .35s ease; }

  /* Stagger entrance for list children. Each child sets style={{"--i": index}}. */
  .stagger > * { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    @keyframes staggerUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .stagger > * {
      animation: staggerUp .45s ease-out both;
      animation-delay: calc(var(--i, 0) * 60ms);
    }
  }

  /* Picked screen — ring scale-in + content stagger */
  @keyframes ringPop {
    0%   { transform: scale(.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pickedFadeUp {
    from { transform: translateY(14px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .ring-pop { animation: ringPop .8s cubic-bezier(.2,.7,.2,1) backwards; }
  .picked-stagger { animation: pickedFadeUp .55s ease-out backwards; }

  /* Filter sheet — backdrop dim + sheet slide up */
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes dimIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .sheet-backdrop { animation: dimIn .25s ease; }
  .sheet { animation: sheetIn .35s cubic-bezier(.2,.7,.2,1); }

  /* Submit spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin .9s linear infinite; }

  /* ===== polish pass: glass depth + quiet neutral shadows (no neon) ===== */
  /* frosted glass for top controls — tinted to the new palette */
  .glass {
    background: rgba(27,28,31,.55) !important;
    backdrop-filter: blur(16px) saturate(1.3);
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
    border: 1px solid rgba(247,246,243,.12) !important;
  }
  html.light .glass {
    background: rgba(255,255,255,.6) !important;
    border-color: rgba(30,30,30,.1) !important;
  }
  /* solid cards: 1px hairline border + soft neutral shadow */
  .card {
    /* Flat-At-Rest: resting cards are NOT glass. Solid fill + hairline +
       soft shadow only. Blur is reserved for genuinely-floating surfaces. */
    background: #1B1C1F;
    border: 1px solid var(--line);
    box-shadow: 0 16px 36px -24px rgba(0,0,0,.8);
    transition: border-color .2s, box-shadow .2s, transform .12s;
  }
  html.light .card {
    /* Solid white object on warm paper, per kit. */
    background: #FFFFFF;
    border-color: var(--line);
    box-shadow: 0 10px 30px -18px rgba(30,30,30,.25);
  }
  @media (hover:hover){ button.card:hover, .card.press:hover { border-color: rgba(247,246,243,.28); } }
  @media (hover:hover){ html.light button.card:hover, html.light .card.press:hover { border-color: rgba(42,45,49,.35); } }
  /* selected / active states — soft cream ring on dark, anthracite ring on light */
  .glow-ice { box-shadow: 0 0 0 1px rgba(247,246,243,.18), 0 10px 24px -18px rgba(0,0,0,.7); }
  .press.glow-primary:active { box-shadow: 0 14px 28px -14px rgba(0,0,0,.8); }
  @media (hover:hover){ .glow-primary:hover { box-shadow: 0 12px 26px -14px rgba(0,0,0,.7); } }
  html.light .glow-ice { box-shadow: 0 0 0 1px rgba(42,45,49,.22), 0 3px 12px -6px rgba(30,30,30,.18); }
  html.light .press.glow-primary:active { box-shadow: 0 6px 18px -8px rgba(30,30,30,.3); }
  @media (hover:hover){ html.light .glow-primary:hover { box-shadow: 0 5px 16px -6px rgba(30,30,30,.25); } }
  /* ornamental texture — only paints outside the (opaque) phone */
  body::before {
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image: radial-gradient(rgba(247,246,243,.05) 1px, transparent 1px);
    background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(120% 90% at 50% 42%, transparent 320px, #000 760px);
    mask-image: radial-gradient(120% 90% at 50% 42%, transparent 320px, #000 760px);
  }
  html.light body::before { background-image: radial-gradient(rgba(42,45,49,.08) 1px, transparent 1px); }

  .profile-hero-overlay {
    background: linear-gradient(180deg, rgba(18,19,21,.3) 0%, rgba(18,19,21,0) 40%, var(--bg) 100%);
  }
  html.light .profile-hero-overlay {
    background:
      linear-gradient(180deg, rgba(247,246,243,.08) 0%, rgba(247,246,243,0) 36%, rgba(247,246,243,.98) 100%),
      linear-gradient(180deg, rgba(30,30,30,.08) 0%, rgba(30,30,30,0) 28%);
  }
  /* #5 — one canonical "floating control over a photo" recipe. Event Detail
     header buttons and the Profile hero controls share it, so there is a single
     over-image glass, distinct from .glass (which floats over the app bg). */
  .glass-over-image, .profile-glass {
    background: rgba(18,19,21,.5);
    border: 1px solid rgba(247,246,243,.18);
    backdrop-filter: blur(12px) saturate(1.25);
    -webkit-backdrop-filter: blur(12px) saturate(1.25);
  }
  html.light .glass-over-image, html.light .profile-glass {
    background: rgba(255,255,255,.72);
    border-color: rgba(30,30,30,.12);
    box-shadow: 0 12px 28px -22px rgba(30,30,30,.35);
  }
  /* Profile keeps its own text-color contract on top of the shared glass. */
  .profile-glass { color: #F7F6F3; }
  html.light .profile-glass { color: #1E1E1E; }
  .profile-hero-text { color: #F7F6F3; }
  .profile-hero-muted { color: rgba(247,246,243,.72); }
  html.light .profile-hero-text { color: #1E1E1E; }
  html.light .profile-hero-muted { color: rgba(30,30,30,.58); }
  html.light .profile-hero-text .stamp,
  html.light .profile-hero-text .smallcaps { color: rgba(30,30,30,.58) !important; }
</style>
</head>
<body class="page-bg min-h-screen">
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

/* ========== curated imagery ========== */
const IMG = {
  beachClub:  "../web/assets/pool-day.jpg",
  pool:       "https://images.unsplash.com/photo-1540541338287-41700207dee6?w=900&q=80&auto=format&fit=crop",
  rooftop:    "https://images.unsplash.com/photo-1551918120-9739cb430c6d?w=900&q=80&auto=format&fit=crop",
  restaurant: "https://images.unsplash.com/photo-1592861956120-e524fc739696?w=900&q=80&auto=format&fit=crop",
  club:       "https://images.unsplash.com/photo-1545128485-c400e7702796?w=900&q=80&auto=format&fit=crop",
  clubRed:    "https://images.unsplash.com/photo-1566737236500-c8ac43014a67?w=900&q=80&auto=format&fit=crop",
  gym:        "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=900&q=80&auto=format&fit=crop",
  lounge:     "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&q=80&auto=format&fit=crop",
  cocktail:   "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=900&q=80&auto=format&fit=crop",
  beirut:     "https://images.unsplash.com/photo-1620553967747-50fdadc4b606?w=1200&q=80&auto=format&fit=crop",
  saraFull:   "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=900&q=80&auto=format&fit=crop",
};

/* ========== Creator data — mock response shape ==========
   Provider TBD (candidates: Phyllo, Modash, Ensembledata). Whichever we
   pick, the backend will normalize to the response shape below so the
   client never has to care. Mocked here so the UX is real even before
   the backend exists.
========================================================== */
function mockCreatorDataFetch(handle){
  // Simulate a 2.4s network call to the creator data provider.
  // Demo: handles "fail" / "notfound" reject so the error + retry path is reachable.
  return new Promise((resolve, reject) => {
    setTimeout(() => {
      const h = (handle || "capriottisara").replace(/^@/, "").toLowerCase();
      if (h === "fail" || h === "notfound" || h === "error") {
        reject(new Error("handle_not_found"));
        return;
      }
      // Real version: POST /api/creator-data { handle } → backend hits provider
      resolve({
        handle: h,
        platform: "instagram",
        data_status: "estimated",        // becomes "verified" after Connect SDK OAuth
        full_name: "Sara Capriotti",
        profile_picture_url: IMG.saraFull,
        bio: "Beirut · model · creator",
        account_type: "creator",          // personal | creator | business
        followers_count: 28400,
        tiktok_followers: 51200,
        following_count: 712,
        media_count: 184,
        engagement_rate: 0.058,            // 5.8%
        quality_score: 0.91,               // Phyllo's fake-follower check (0-1)
        audience: {
          gender_split: { female: 0.62, male: 0.38 },
          age_split: { "13-17": 0.04, "18-24": 0.41, "25-34": 0.38, "35-44": 0.13, "45+": 0.04 },
          country_split: [
            { code: "LB", label: "Lebanon",  pct: 0.71 },
            { code: "AE", label: "UAE",      pct: 0.14 },
            { code: "SA", label: "Saudi",    pct: 0.07 },
            { code: "EU", label: "Other EU", pct: 0.08 },
          ],
        },
        tier_suggestion: 1,                // 1 = Tier 1, etc.
        fetched_at: new Date().toISOString(),
      });
    }, 2400);
  });
}

const EVENTS = [
  { id:"pool",   title:"Pool Day",        venue:"Cyan Beach Club",     area:"Jiyeh",       date:"Sun · 25 May",  time:"14:00",  img:IMG.beachClub,  type:"Beach",      seats:20, applied:137, badge:"Open",      gallery:[IMG.beachClub, IMG.pool, IMG.cocktail, IMG.beirut] },
  { id:"sound",  title:"Sound Bath",      venue:"Pyrite Mar Mikhael",  area:"Mar Mikhael", date:"Sun · 25 May",  time:"23:00",  img:IMG.club,       type:"Club",       seats:30, applied:212, badge:"24h left",  gallery:[IMG.club, IMG.clubRed, IMG.cocktail, IMG.lounge] },
  { id:"tasting",title:"Chef Tasting",    venue:"Em Sherif Café",      area:"Achrafieh",   date:"Sat · 24 May",  time:"20:00",  img:IMG.restaurant, type:"Restaurant", seats:12, applied:88,  badge:"Closing",   gallery:[IMG.restaurant, IMG.lounge, IMG.cocktail] },
  { id:"sunset", title:"Rooftop Sundown", venue:"Sporting",            area:"Manara",      date:"Sat · 24 May",  time:"18:30",  img:IMG.pool,       type:"Pool",       seats:25, applied:154, badge:"",          gallery:[IMG.pool, IMG.rooftop, IMG.beirut, IMG.cocktail] },
  { id:"loungenight", title:"Late Lounge", venue:"Centrale",          area:"Saifi",       date:"Sun · 25 May",  time:"22:00",  img:IMG.lounge,     type:"Lounge",     seats:18, applied:101, badge:"",          gallery:[IMG.lounge, IMG.cocktail, IMG.restaurant] },
];

/* Seed profile = the normalized creator-data shape (estimated, pre-verify).
   Used as the Profile fallback when onboarding is skipped, and as the base the
   Verify-with-Instagram flow flips to data_status:"verified". Provider that
   supplies this in production is deliberately not locked (see context.md). */
const SEED_PROFILE = {
  full_name: "Sara Capriotti",
  handle: "capriottisara",
  profile_picture_url: IMG.saraFull,
  followers_count: 28400,
  tiktok_followers: 51200,
  engagement_rate: 0.058,
  data_status: "estimated",
  audience: {
    gender_split: { female: 0.62, male: 0.38 },
    country_split: [
      { label: "Lebanon",  pct: 0.71 },
      { label: "UAE",      pct: 0.14 },
      { label: "Saudi",    pct: 0.07 },
      { label: "Other EU", pct: 0.08 },
    ],
  },
};

/* ========== Intro clips — grainy Beirut nightlife montage ==========
   3 Veo 3.1 clips (5s each), animated from Nano Banana Pro stills:
   Raouche dusk / Batroun coast / Beirut rooftop night. Grainy retro grade
   baked into the stills + reinforced in animation. TSS-style entry montage.
   Posters are the first frame, shown before the video paints.
==================================================================== */
const INTRO_CLIPS = [
  { src:"../web/assets/intro-1.mp4", poster:"../web/assets/intro-1.jpg" },
  { src:"../web/assets/intro-2.mp4", poster:"../web/assets/intro-2.jpg" },
  { src:"../web/assets/intro-3.mp4", poster:"../web/assets/intro-3.jpg" },
];

/* ========== Icon helper (Heroicons, inline) ==========
   Heroicons outline, inlined as SVG so there's no icon CDN dependency at all.
   Closest free stand-in for SF Symbols, which the SwiftUI build will use.
   Call sites keep their lucide-style names; we map to Heroicon glyphs here.
   `stroke` drives stroke-width (Heroicons outline is 1.5 by default).
   instagram has no Heroicon (no brand glyphs) so it's a small custom mark.

function Icon({ name, size=18, stroke=1.5, className="" }){
  const inner = HICONS[name] || HICONS["sparkle"];
  return (
    <svg className={"inline-block "+className} width={size} height={size}
         viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke}
         aria-hidden="true" style={{flexShrink:0}}
         dangerouslySetInnerHTML={{__html: inner}}/>
  );
}

/* ========== Countdown — one rule for timers ==========
   #10 — ICE-AS-TEXT vs ICE-AS-FILL:
   • Ice FILL = the one action / affirmative state (primary buttons, chip-ice,
     selected day + filter, the "You're in" ring).
   • Ice TEXT = the one *value* number worth reading (seats left, reputation,
     venue score, this countdown). Ordinals and plain labels are never ice.
   Colons render tighter + dimmed so the tabular digits carry the weight.
====================================================== */
function Countdown({ value, className="", style={} }){
  const parts = String(value).split(":");
  return (
    <span className={"font-mono "+className} style={style}>
      {parts.map((p,i)=>(
        <React.Fragment key={i}>
          {i>0 && <span style={{opacity:.4, margin:"0 .06em"}}>:</span>}
          {p}
        </React.Fragment>
      ))}
    </span>
  );
}

/* ========== Small UI atoms — TSS UX patterns in our skin ==========
   Date-block chips, status pills, a pill-track segmented control, an iOS
   toggle, a save control, a finished section header, and a transient toast.
   Structure borrowed from The Secret Society's app; colour/voice stays
   Carbon + Ice. These replace the thin "label + floating hairline" dividers
   and give every minor control a visible response.
==================================================================== */

// Save / bookmark control. Ice-filled when saved, glass when not.
function SaveButton({ saved, onClick, size=36 }){
  return (
    <button
      onClick={(e)=>{ e.stopPropagation(); onClick(); }}
      aria-label={saved ? "Saved · tap to remove" : "Save event"}
      aria-pressed={saved}
      className={"press rounded-full flex items-center justify-center "+(saved ? "" : "glass-over-image")}
      style={{ width:size, height:size, ...(saved ? {background:"var(--ice)", color:"var(--ice-ink)"} : {}) }}>
      <Icon name={saved ? "bookmark-fill" : "bookmark"} size={Math.round(size*0.42)} stroke={1.6}/>
    </button>
  );
}

// iOS-style switch. Ice when on.
function Toggle({ on, onChange }){
  return (
    <button onClick={()=>onChange(!on)} role="switch" aria-checked={on} className="press shrink-0"
      style={{ width:46, height:28, borderRadius:999, position:"relative",
        background: on ? "var(--ice)" : "var(--bg-elev2)", border:"1px solid var(--line-2)", transition:"background .2s" }}>
      <span style={{ position:"absolute", top:2, left: on ? 20 : 2, width:22, height:22, borderRadius:"50%",
        background: on ? "var(--ice-ink)" : "var(--ink)", transition:"left .2s" }}/>
    </button>
  );
}

// Rounded status badge. tone: ice (affirmative/open) | neutral (muted) | outline.
// Kit badge style: leading dot + sentence-case label ("• Popular").
function StatusPill({ label, tone="neutral", dot=true }){
  const style = tone==="ice" ? {background:"var(--ice)", color:"var(--ice-ink)"}
    : tone==="outline" ? {border:"1px solid var(--line-2)", color:"var(--ink)"}
    : {background:"var(--bg-elev2)", color:"var(--ink)"};
  return (
    <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-medium" style={style}>
      {dot && <span className="w-1.5 h-1.5 rounded-full" style={{background: tone==="ice" ? "var(--ice-ink)" : "var(--ice)"}}/>}
      {label}
    </span>
  );
}

// "Sun · 25 May" -> { weekday:"Sun", day:"25", month:"May" }
function parseDate(str){
  const [wd, rest] = String(str).split("·").map(s=>s.trim());
  const m = (rest||"").split(" ");
  return { weekday: wd||"", day: m[0]||"", month: m.slice(1).join(" ")||"" };
}
// TSS-style rounded date block. tone: ice | neutral.
function DateChip({ day, sub, tone="neutral" }){
  const style = tone==="ice" ? {background:"var(--ice)", color:"var(--ice-ink)"} : {background:"var(--bg-elev2)", color:"var(--ink)"};
  return (
    <div className="rounded-[12px] flex flex-col items-center justify-center shrink-0" style={{ width:48, height:54, ...style }}>
      <div className="font-black font-mono text-[20px] leading-none">{day}</div>
      <div className="text-[9px] font-medium mt-0.5" style={{opacity:.8}}>{sub}</div>
    </div>
  );
}

// TSS-style widget stat tile: big number top, small label under.
function StatTile({ n, label, ice=false, onClick }){
  const Tag = onClick ? "button" : "div";
  return (
    <Tag onClick={onClick} className={"card rounded-[16px] p-4 text-left "+(onClick?"press":"")}>
      <div className="font-black font-mono text-[26px] leading-none" style={ice?{color:"var(--ice)"}:undefined}>{n}</div>
      <div className="stamp mt-1.5">{label}</div>
    </Tag>
  );
}

// Finished section header — short ice tick + label, optional right meta pill.
// Replaces the old "label + thin trailing hairline" treatment everywhere.
function SectionHead({ label, right, className="" }){
  return (
    <div className={"px-5 flex items-center justify-between "+className}>
      <div className="flex items-center gap-2.5">
        <span className="rounded-full" style={{ width:3, height:15, background:"var(--ice)" }}/>
        <span className="section-label">{label}</span>
      </div>
      {right != null && (
        <span className="text-[10px] font-medium px-2.5 py-1 rounded-full" style={{border:"1px solid var(--line-2)", color:"var(--ink-mute)"}}>{right}</span>
      )}
    </div>
  );
}

// Pill-track segmented control (TSS toggle pattern). items: [{id,label,count}].
function Segmented({ items, value, onChange }){
  return (
    <div className="flex gap-1 p-1 rounded-full" style={{ background:"var(--bg-elev)", border:"1px solid var(--line)" }}>
      {items.map(it=>{
        const on = it.id===value;
        return (
          <button key={it.id} onClick={()=>onChange(it.id)} className="press flex-1 h-9 rounded-full flex items-center justify-center gap-1 text-[11px] font-medium"
            style={on ? {background:"var(--ink)", color:"var(--bg)"} : {color:"var(--ink-mute)"}}>
            <span>{it.label}</span>
            {it.count != null && <span style={{opacity:.65}}>{it.count}</span>}
          </button>
        );
      })}
    </div>
  );
}

// Transient toast inside the phone frame — gives minor controls a visible reply.
function Toast({ msg }){
  if(!msg) return null;
  return (
    <div className="absolute left-0 right-0 flex justify-center z-[60] pointer-events-none" style={{bottom:104}}>
      <div key={msg} className="anim-up px-4 py-2.5 rounded-full glass-over-image text-[12px] flex items-center gap-2" style={{maxWidth:"82%"}}>
        <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:"var(--ice)"}}/>
        <span className="truncate">{msg}</span>
      </div>
    </div>
  );
}

    { id:"more",  label:"More",            icon:"share",       toast:"More share options" },

  return (
    <>
      <div onClick={onClose} className="absolute inset-0 z-40 sheet-backdrop" style={{background:"rgba(18,19,21,.55)", backdropFilter:"blur(4px)"}}/>

            <div className="font-display text-[17px] mt-0.5 truncate">{event.title}</div>
            <div className="text-[11px]" style={{color:"var(--ink-mute)"}}>{event.venue} · {event.date}</div>

        <div className="grid grid-cols-4 gap-2">

            <button key={a.id} onClick={()=>{ onToast(a.toast); onClose(); }} className="press flex flex-col items-center gap-2 py-3 rounded-[14px]" style={{background:"var(--bg-elev)", border:"1px solid var(--line)"}}>

/* ========== Filter sheet (Explore overlay) ========== */
function FilterSheet({ open, onClose, advFilters, setAdvFilters }){
  if(!open) return null;
  const verticals = ["Beach","Club","Restaurant","Lounge","Gym","Rooftop"];
  const distances = ["< 5 km","5 – 15 km","15 – 30 km","Beirut + Mount"];
  const timings = ["Tonight","This week","Anytime"];

  const toggleVert = (v) => setAdvFilters({
    ...advFilters,
    verticals: advFilters.verticals.includes(v)
      ? advFilters.verticals.filter(x=>x!==v)
      : [...advFilters.verticals, v]
  });

  return (
    <>
      <div onClick={onClose} className="absolute inset-0 z-40 sheet-backdrop" style={{background:"rgba(18,19,21,.55)", backdropFilter:"blur(4px)"}}/>
      <div className="absolute left-0 right-0 bottom-0 z-50 sheet rounded-t-[24px] px-5 pt-4 pb-7" style={{background:"var(--bg)", borderTop:"1px solid var(--line-2)"}}>
        <div className="w-10 h-1 rounded-full mx-auto mb-5" style={{background:"var(--ink-mute)", opacity:.4}}/>

        <div className="flex items-center justify-between mb-5">
          <div className="font-black text-[22px] leading-none">Filters</div>
          <button onClick={onClose} className="press w-8 h-8 rounded-full flex items-center justify-center" style={{background:"var(--bg-elev)"}}>
            <Icon name="x" size={14} stroke={1.5}/>
          </button>
        </div>

        <div className="stamp mb-2">Vertical</div>
        <div className="flex flex-wrap gap-1.5 mb-5">
          {verticals.map(v=>{
            const on = advFilters.verticals.includes(v);
            return (
              <button key={v} onClick={()=>toggleVert(v)} className={"press px-3 h-8 rounded-full text-[12px] "+(on?"glow-ice":"")} style={on ? {background:"var(--ink)", color:"var(--bg)"} : {border:"1px solid var(--line-2)", color:"var(--ink)"}}>
                {v}
              </button>
            );
          })}
        </div>

        <div className="stamp mb-2">Distance</div>
        <div className="flex flex-wrap gap-1.5 mb-5">
          {distances.map(d=>{
            const on = advFilters.distance === d;
            return (
              <button key={d} onClick={()=>setAdvFilters({...advFilters, distance: on ? null : d})} className={"press px-3 h-8 rounded-full text-[12px] "+(on?"glow-ice":"")} style={on ? {background:"var(--ice)", color:"var(--ice-ink)"} : {border:"1px solid var(--line-2)", color:"var(--ink)"}}>
                {d}
              </button>
            );
          })}
        </div>

        <div className="stamp mb-2">When</div>
        <div className="flex gap-1.5 mb-6">
          {timings.map(t=>{
            const on = advFilters.timing === t;
            return (
              <button key={t} onClick={()=>setAdvFilters({...advFilters, timing: t})} className={"press flex-1 h-10 rounded-[12px] text-[12px] "+(on?"glow-ice":"")} style={on ? {background:"var(--ink)", color:"var(--bg)"} : {border:"1px solid var(--line-2)", color:"var(--ink)"}}>
                {t}
              </button>
            );
          })}
        </div>

        <div className="flex gap-2">
          <button onClick={()=>setAdvFilters({ verticals:[], distance:null, timing:"Tonight" })} className="press flex-1 h-12 rounded-full text-[12px]" style={{border:"1px solid var(--line-2)", color:"var(--ink)"}}>
            Reset
          </button>
          <button onClick={onClose} className="press glow-primary flex-[2] h-12 rounded-full text-[13px] font-semibold" style={{background:"var(--ice)", color:"var(--ice-ink)"}}>
            Show rooms
          </button>
        </div>
      </div>
    </>
  );
}

  return (
    <>
      <div onClick={onClose} className="absolute inset-0 z-40 sheet-backdrop" style={{background:"rgba(18,19,21,.55)", backdropFilter:"blur(4px)"}}/>
      <div className="absolute left-0 right-0 bottom-0 z-50 sheet rounded-t-[24px] px-5 pt-4 pb-7" style={{background:"var(--bg)", borderTop:"1px solid var(--line-2)"}}>
        <div className="w-10 h-1 rounded-full mx-auto mb-5" style={{background:"var(--ink-mute)", opacity:.4}}/>
        <div className="flex items-center justify-between mb-5">
          <div className="font-black text-[22px] leading-none">May</div>
          <button onClick={onClose} aria-label="Close" className="press w-8 h-8 rounded-full flex items-center justify-center" style={{background:"var(--bg-elev)"}}>
            <Icon name="x" size={14} stroke={1.5}/>
          </button>
        </div>

        <div className="grid grid-cols-7 mb-2">
          {["M","T","W","T","F","S","S"].map((w,i)=>(
            <div key={i} className="stamp text-center">{w}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-y-2 justify-items-center">
          {Array.from({length:blanks}).map((_,i)=>(
            <div key={"b"+i} style={{width:36, height:36}}/>
          ))}
          {Array.from({length:31}, (_,i)=>i+1).map(d=>{
            const has = eventDays.includes(d);
            const sel = d === activeDay;
            const Tag = has ? "button" : "div";
            return (
              <Tag key={d} onClick={has ? ()=>onPick(d) : undefined}
                className={"rounded-full flex flex-col items-center justify-center "+(has?"press":"")}
                style={{width:36, height:36, background: sel ? "var(--ice)" : "transparent", color: sel ? "var(--ice-ink)" : "var(--ink)"}}>
                <span className="font-mono text-[13px] leading-none">{d}</span>
                {has && <span className="rounded-full mt-1" style={{width:4, height:4, background: sel ? "var(--ice-ink)" : "var(--ice)"}}/>}
              </Tag>
            );
          })}
        </div>
      </div>
    </>
  );
}

/* ========== 02 — EXPLORE ========== */
function ScreenExplore({ tab, onTab, onPickEvent, saved, onToggleSave, onToast }){
  const [filter, setFilter] = useState("all");
  const [sheetOpen, setSheetOpen] = useState(false);
  const [calOpen, setCalOpen] = useState(false);
  const [activeDay, setActiveDay] = useState(25);
  const [advFilters, setAdvFilters] = useState({ verticals:[], distance:null, timing:"Tonight" });
  const days = [
    { d:"23", w:"Fri" }, { d:"24", w:"Sat" }, { d:"25", w:"Sun" }, { d:"26", w:"Mon" }, { d:"27", w:"Tue" }, { d:"28", w:"Wed" }
  ];
  // May here starts Thursday — weekday lookup for the day-pick toast.
  const weekdayOf = (d) => ["Thu","Fri","Sat","Sun","Mon","Tue","Wed"][(d-1)%7];
  const pickDay = (d) => {
    setActiveDay(d);
    setCalOpen(false);
    if (onToast) onToast("Showing " + weekdayOf(d) + " · " + d + " May");
  };
  const filters = ["all","beach","club","restaurant","lounge"];
  const list = EVENTS.filter(e => filter==="all" ? true : e.type.toLowerCase()===filter);
  const activeAdvCount = advFilters.verticals.length + (advFilters.distance ? 1 : 0) + (advFilters.timing !== "Tonight" ? 1 : 0);

  return (
    <PhoneScreen tab={tab} onTab={onTab}>
      <div className="px-5 pt-[60px] pb-3 flex items-end justify-between">
        <div className="font-black font-display-l text-[40px] leading-none">Index</div>
        <div className="flex items-center gap-2">
          <button onClick={()=>setCalOpen(true)} aria-label="Open calendar" className="press glass w-9 h-9 rounded-full flex items-center justify-center">
            <Icon name="calendar" size={15} stroke={1.5}/>
          </button>
          <button onClick={()=>setSheetOpen(true)} className="press glass flex items-center gap-1.5 px-3 h-9 rounded-full">
            <Icon name="sliders-horizontal" size={13} stroke={1.5}/>

          </button>
        </div>
      </div>
      <FilterSheet open={sheetOpen} onClose={()=>setSheetOpen(false)} advFilters={advFilters} setAdvFilters={setAdvFilters}/>
      {calOpen && <CalendarSheet onClose={()=>setCalOpen(false)} activeDay={activeDay} onPick={pickDay}/>}

      <div className="px-5 pt-4 flex gap-2 overflow-x-auto noscroll">

            <div key={d.d} className={"flex-shrink-0 w-[58px] h-[68px] rounded-[12px] flex flex-col items-center justify-center "+(on?"glow-ice":"border")} style={{background: on ? "var(--ice)" : "transparent", borderColor:"var(--line-2)", color: on ? "var(--ice-ink)" : "var(--ink)"}}>
              <div className="font-mono text-[20px] leading-none">{d.d}</div>
              <div className="text-[9px] font-medium mt-1 opacity-75">{d.w}</div>

      <div className="px-5 pt-4 flex gap-2 overflow-x-auto noscroll">
        {filters.map(f=>(
          <button key={f} onClick={()=>setFilter(f)} className={"press flex-shrink-0 px-3 h-8 rounded-full text-[11px] font-medium "+(filter===f?"glow-ice":"chip-outline")} style={filter===f ? {background:"var(--ink)", color:"var(--bg)"} : {}}>

      <SectionHead label={list.length + " rooms"} right="Closes soonest" className="pt-6 pb-3"/>

                  {lead.badge && <StatusPill label={lead.badge} tone="ice"/>}

                <div className="absolute top-3 right-3"><SaveButton saved={saved.includes(lead.id)} onClick={()=>onToggleSave(lead.id)}/></div>

                      <div className="font-display text-[17px] mt-0.5 truncate">{e.title}</div>

                    </div>
                  </button>
                ))}

      })()}

      <div className="h-8"/>

  );

          <div className="py-4 pl-3">
            <div className="stamp">Seats</div>

            <div className="font-display text-[16px]">{e.venue}</div>
            <div className="text-[12px]" style={{color:"var(--ink-mute)"}}>{e.area} · 22 km south of city</div>

          <div className="flex-1">
            <div className="stamp" style={{color:"var(--ink-mute)"}}>Closes in</div>

              <span className="font-semibold text-[15px]">Apply · free</span>

              <span className="font-semibold text-[15px]">Reviewing</span>
              <span className="spin inline-block w-4 h-4 rounded-full" style={{border:"2px solid currentColor", borderTopColor:"transparent"}}/>

              <span className="font-semibold text-[15px]">Submitted</span>
              <Icon name="check" size={16} stroke={1.8}/>
            </>)}

        </div>
      </div>
      <HomeIndicator/>
    </div>
  );
}

/* ========== 04 — MY EVENTS ========== */
function ScreenMyEvents({ tab, onTab, confirmedEvent, savedEvents, onToggleSave, onPickEvent, onToast }){
  const [seg, setSeg] = useState(confirmedEvent ? "confirmed" : "applied");
  const conf = confirmedEvent ? parseDate(confirmedEvent.date) : null;

  // One source of truth for the counts — the stat tiles and the segmented
  // control both read from here.
  const counts = {
    applied:   confirmedEvent ? 0 : 1,
    confirmed: confirmedEvent ? 1 : 0,
    saved:     savedEvents.length,
    past:      24,
  };
  const segs = [
    { id:"applied",   label:"Applied",   count: counts.applied },
    { id:"confirmed", label:"Confirmed", count: counts.confirmed },
    { id:"saved",     label:"Saved",     count: counts.saved },
    { id:"past",      label:"Past",      count: counts.past },
  ];

  return (
    <PhoneScreen tab={tab} onTab={onTab}>
      <div className="px-5 pt-[60px] pb-4 flex items-center justify-between">
        <div className="font-black font-display-l text-[36px] leading-none">Invites</div>
        <button onClick={()=>onToast("Calendar sync coming in the build")} aria-label="Calendar" className="press glass w-10 h-10 rounded-full flex items-center justify-center">
          <Icon name="calendar" size={16} stroke={1.4}/>
        </button>
      </div>

      {/* Status at a glance — tap a tile to jump to that segment */}
      <div className="px-5 pb-4 grid grid-cols-3 gap-2">
        <StatTile n={counts.applied} label="Applied" onClick={()=>setSeg("applied")}/>
        <StatTile n={counts.confirmed} label="Confirmed" ice onClick={()=>setSeg("confirmed")}/>
        <StatTile n={counts.past} label="Past" onClick={()=>setSeg("past")}/>
      </div>

      <div className="px-5 pb-4">
        <Segmented items={segs} value={seg} onChange={setSeg}/>
      </div>

      {/* CONFIRMED */}
      {seg==="confirmed" && (confirmedEvent ? (
        <div className="px-5 pt-1 space-y-4 anim-up">
          <div className="card rounded-[18px] overflow-hidden">
            <div className="relative h-[160px]">
              <img src={confirmedEvent.img} className="absolute inset-0 w-full h-full object-cover" alt=""/>
              <div className="absolute inset-0" style={{background:"linear-gradient(180deg, rgba(27,28,31,0) 30%, rgba(27,28,31,.95) 100%)"}}/>
              <div className="absolute top-3 left-3"><StatusPill label="Confirmed" tone="ice" dot/></div>
              <div className="absolute bottom-3 left-3 right-3" style={{color:"#F7F6F3"}}>
                <div className="font-black text-[22px] leading-none">{confirmedEvent.title}</div>
                <div className="text-[11px] mt-1 opacity-80">{confirmedEvent.venue} · {confirmedEvent.date}</div>
              </div>
            </div>
            <div className="px-4 py-3 flex items-center gap-3">
              <DateChip day={conf.day} sub={conf.month} tone="ice"/>
              <div className="flex-1">
                <div className="stamp">Check-in</div>
                <div className="text-[13px] font-medium mt-0.5 font-mono">{confirmedEvent.time}</div>
              </div>
              <button onClick={()=>onToast("Pass · show the QR at the door")} className="press px-3 h-9 rounded-full text-[11px] font-medium" style={{background:"var(--ink)", color:"var(--bg)"}}>View pass</button>
            </div>
          </div>
        </div>
      ) : (
        <div className="px-5 pt-6 text-[13px]" style={{color:"var(--ink-mute)"}}>No confirmed seats yet. Apply to a room, then watch for the pick.</div>
      ))}

      {/* APPLIED — an application still under review (you applied; the venue hasn't picked yet) */}
      {seg==="applied" && (!confirmedEvent ? (
        <div className="px-5 pt-1 space-y-4 anim-up">
          <button onClick={()=>onPickEvent(EVENTS[1])} className="press card w-full text-left flex items-center gap-3 p-3 rounded-[14px]">
            <img src={IMG.club} className="w-14 h-14 rounded-[10px] object-cover" alt=""/>
            <div className="flex-1 min-w-0">
              <div className="font-display text-[16px]">Sound Bath</div>
              <div className="text-[11px]" style={{color:"var(--ink-mute)"}}>Pyrite Mar Mikhael · Sun 25 May</div>
              <div className="mt-1.5"><StatusPill label="Under review" tone="outline" dot/></div>
            </div>
            <div className="text-[10px] shrink-0" style={{color:"var(--ink-mute)"}}>applied 2h ago</div>
          </button>
          <div className="text-[12px]" style={{color:"var(--ink-mute)"}}>Venues pick applicants up to doors. We notify you if you're in. Not every application is picked.</div>
        </div>
      ) : (
        <div className="px-5 pt-6 text-[13px]" style={{color:"var(--ink-mute)"}}>Nothing under review.</div>
      ))}

      {/* SAVED — events you bookmarked. Save/unsave from any card lands here. */}
      {seg==="saved" && (savedEvents.length > 0 ? (
        <div className="px-5 pt-1 space-y-3 stagger">
          {savedEvents.map((e,i)=>(
            <div key={e.id} style={{"--i":i}} className="card flex items-center gap-3 p-3 rounded-[14px]">
              <button onClick={()=>onPickEvent(e)} className="press flex items-center gap-3 flex-1 min-w-0 text-left">
                <img src={e.img} className="w-14 h-16 rounded-[10px] object-cover shrink-0" alt=""/>
                <div className="flex-1 min-w-0">
                  <div className="stamp">{e.type}</div>
                  <div className="font-display text-[17px] mt-0.5 truncate">{e.title}</div>
                  <div className="text-[11px] truncate" style={{color:"var(--ink-mute)"}}>{e.venue} · {e.area}</div>
                  <div className="mt-1.5"><span className="font-mono text-[11px]" style={{color:"var(--ice)"}}>{e.seats} seats</span><span className="font-mono text-[11px]" style={{color:"var(--ink-mute)"}}> · {e.date}</span></div>
                </div>
              </button>
              <SaveButton saved={true} onClick={()=>onToggleSave(e.id)}/>
            </div>
          ))}
        </div>
      ) : (
        <div className="px-5 py-16 text-center">
          <div className="w-12 h-12 rounded-full mx-auto flex items-center justify-center" style={{border:"1px solid var(--line-2)"}}>
            <Icon name="bookmark" size={18} stroke={1.4}/>
          </div>
          <div className="section-label mt-4">Nothing saved yet</div>
          <div className="text-[13px] mt-2" style={{color:"var(--ink-mute)"}}>Tap the bookmark on any room to keep it here.</div>
        </div>
      ))}

      {/* PAST */}
      {seg==="past" && (
        <div className="px-5 pt-1 space-y-3 stagger">
          {[
            { t:"Late Lounge",    v:"Centrale",  date:"22 Apr", score:"9.2", img:IMG.lounge   },
            { t:"Chef Tasting",   v:"Em Sherif", date:"15 Apr", score:"8.8", img:IMG.restaurant},
            { t:"Rooftop Sundown", v:"Sporting", date:"11 Apr", notSelected:true, img:IMG.pool },
            { t:"Pool Day vol. II", v:"Cyan",     date:"08 Apr", score:"9.5", img:IMG.beachClub },
          ].map((e,i)=>(
            <div key={i} className="card flex items-center gap-3 p-3 rounded-[14px]" style={{"--i":i, opacity: e.notSelected ? 0.6 : 1}}>
              <img src={e.img} className="w-14 h-14 rounded-[10px] object-cover" style={{filter: e.notSelected ? "grayscale(1)" : "grayscale(.25)"}} alt=""/>
              <div className="flex-1">
                <div className="font-display text-[16px]">{e.t}</div>
                <div className="text-[11px]" style={{color:"var(--ink-mute)"}}>{e.notSelected ? e.v+" · venue picked others" : e.v+" · "+e.date}</div>
              </div>
              <div className="text-right">
                {e.notSelected
                  ? <StatusPill label="Not selected" tone="outline"/>
                  : <>
                      <div className="font-black text-[18px] font-mono" style={{color:"var(--ice)"}}>{e.score}</div>
                      <div className="stamp">Venue rating</div>
                    </>}
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="h-8"/>
    </PhoneScreen>
  );
}

/* ========== 05 — PROFILE (gallery-style hero with fade) ========== */
function ScreenProfile({ tab, onTab, profile, onSettings, onVerify }){
  // `profile` is the creator-data provider's normalized response (vendor-neutral;
  // provider not yet locked). Null when onboarding was skipped → fall back to the
  // shared SEED_PROFILE so the demo always renders.
  const p = profile || SEED_PROFILE;
  const verified = p.data_status === "verified";
  const followersK = p.followers_count >= 1000
    ? (p.followers_count / 1000).toFixed(p.followers_count >= 10000 ? 0 : 1)
    : p.followers_count;
  const followersUnit = p.followers_count >= 1000 ? "k" : "";
  const tiktokRaw = p.tiktok_followers || SEED_PROFILE.tiktok_followers;
  const tiktokK = tiktokRaw >= 1000
    ? (tiktokRaw / 1000).toFixed(tiktokRaw >= 10000 ? 0 : 1)
    : tiktokRaw;
  const tiktokUnit = tiktokRaw >= 1000 ? "k" : "";
  const engagementPct = (p.engagement_rate * 100).toFixed(1);
  const female = Math.round(p.audience.gender_split.female * 100);
  const male = Math.round(p.audience.gender_split.male * 100);
  const firstName = p.full_name.split(" ")[0];
  const lastName = p.full_name.split(" ").slice(1).join(" ");

  return (
    <PhoneScreen tab={tab} onTab={onTab}>
      {/* Editorial hero — full-bleed photo with gradient fade to bg */}
      <div className="relative h-[460px]">
        <img src={p.profile_picture_url || IMG.saraFull} className="absolute inset-0 w-full h-full object-cover" alt=""/>
        <div className="profile-hero-overlay absolute inset-0"/>

        <div className="absolute top-[60px] left-5 right-5 flex items-center justify-between z-10">
          <div className="profile-glass flex items-center gap-2 px-2.5 py-1 rounded-full">
            <span className="w-1.5 h-1.5 rounded-full" style={{background:"var(--ice)"}}/>
            <span className="stamp" style={{color:"inherit"}}>{verified ? "Verified" : "Self-reported"} · Tier 1</span>
          </div>
          <button onClick={onSettings} aria-label="Settings" className="profile-glass press w-9 h-9 rounded-full flex items-center justify-center">
            <Icon name="settings" size={15} stroke={1.4}/>
          </button>
        </div>

        <div className="profile-hero-text absolute right-3 top-[130px] vt z-10">
          <span className="stamp" style={{color:"rgba(247,246,243,.7)"}}>Beirut · MMXXVI · No. 048</span>
        </div>

        <div className="profile-hero-text absolute bottom-5 left-5 right-5 z-10">
          <div className="smallcaps mb-2" style={{color:"rgba(247,246,243,.7)"}}>Member since '24</div>
          <div className="font-black font-display-l text-[48px] leading-[0.9]">{firstName}{lastName ? <><br/>{lastName}</> : ""}</div>
          <div className="flex items-center gap-2 mt-3">
            <Icon name="instagram" size={13} stroke={1.5} className="opacity-70"/>
            <span className="text-[13px] opacity-80">@{p.handle}</span>
          </div>
        </div>
      </div>

      {/* Stat strip — TSS widget tiles: reputation / followers / engagement */}
      <div className="px-5 py-5 grid grid-cols-3 gap-2" style={{borderBottom:"1px solid var(--line-2)"}}>
        <StatTile n="9.4" label="Reputation" ice/>
        <StatTile n={followersK + followersUnit} label="Followers"/>
        <StatTile n={engagementPct + "%"} label="Engagement"/>
      </div>

      {/* Verify-with-Instagram upgrade strip (only if data is still estimated) */}
      {!verified && (
        <div className="card mx-5 mt-4 px-3 py-2.5 rounded-[12px] flex items-center gap-3">
          <Icon name="instagram" size={16} stroke={1.5} className="opacity-70"/>
          <div className="flex-1">
            <div className="text-[12px] font-medium">Verify with Instagram</div>
            <div className="text-[11px]" style={{color:"var(--ink-mute)"}}>Numbers below are estimated. Connect for real data + tier upgrade.</div>
          </div>
          <button onClick={onVerify} className="press px-3 h-7 rounded-full text-[11px] font-semibold" style={{background:"var(--ice)", color:"var(--ice-ink)"}}>
            Connect
          </button>
        </div>
      )}

      {/* Audience */}
      <SectionHead label="Audience" right={verified ? "Live" : "Estimated"} className="pt-7 pb-3"/>

      <div className="px-5 space-y-3">
        <div>
          <div className="flex justify-between text-[11px]" style={{color:"var(--ink-2)"}}>
            <span>Female · {female}%</span>
            <span>Male · {male}%</span>
          </div>
          <div className="mt-1.5 h-[6px] rounded-full overflow-hidden flex" style={{background:"var(--bg-elev2)"}}>
            <div style={{width:female+"%", background:"var(--ice)"}}/>
            <div style={{width:male+"%", background:"var(--ink-mute)"}}/>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3 mt-4">
          {p.audience.country_split.map((r,i)=>(
            <div key={i} className="card p-3 rounded-[12px]">
              <div className="stamp">{r.label}</div>
              <div className="font-mono text-[18px] mt-1">{Math.round(r.pct * 100)}%</div>
            </div>
          ))}
        </div>
      </div>

      {/* Recent */}
      <SectionHead label="Recent" className="pt-9 pb-3"/>
      <div className="px-5 space-y-3 pb-4">
        {[
          { t:"Pool Day vol. II", v:"Cyan",     date:"08 Apr", score:"9.5", img:IMG.beachClub },
          { t:"Late Lounge",      v:"Centrale", date:"22 Apr", score:"9.2", img:IMG.lounge   },
        ].map((e,i)=>(
          <div key={i} className="flex items-center gap-3">
            <img src={e.img} className="w-12 h-14 rounded-[10px] object-cover" alt=""/>
            <div className="flex-1">
              <div className="font-display text-[16px]">{e.t}</div>
              <div className="text-[11px]" style={{color:"var(--ink-mute)"}}>{e.v} · {e.date}</div>
            </div>
            <div className="font-mono text-[16px]" style={{color:"var(--ice)"}}>{e.score}</div>
          </div>
        ))}
      </div>

      <div className="h-8"/>
    </PhoneScreen>
  );
}

  );
}

/* ========== Intro video background — crossfading 5s clips ==========
   TSS-style: full-bleed grainy montage that cross-dissolves between clips,
   each held ~5s, looping. Muted + autoplay + playsInline so it runs as a
   silent hero background. Grain/vignette/scrims layered on top for legibility.
==================================================================== */
function IntroVideoBG(){
  const [active, setActive] = useState(0);
  const vids = useRef([]);
  const reduce = typeof window !== "undefined" && window.matchMedia
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  useEffect(() => {
    if (reduce) return;                       // hold first frame if reduced-motion
    const id = setInterval(() => setActive(a => (a + 1) % INTRO_CLIPS.length), 5000);
    return () => clearInterval(id);
  }, [reduce]);

  useEffect(() => {
    const v = vids.current[active];
    if (v) { try { v.currentTime = 0; const p = v.play(); if (p && p.catch) p.catch(()=>{}); } catch(e){} }
  }, [active]);

  return (
    <div className="absolute inset-0 overflow-hidden" style={{background:"#0D0E10"}}>
      {INTRO_CLIPS.map((c,i)=>(
        <video key={i} ref={el => vids.current[i] = el}
          src={c.src} poster={c.poster}
          muted loop playsInline autoPlay preload="auto"
          className="absolute inset-0 w-full h-full object-cover"
          style={{opacity: i===active ? 1 : 0, transition:"opacity 1.1s ease", filter:"contrast(1.08) saturate(.82)"}}/>
      ))}
      {/* baked grain reinforced */}
      <div className="absolute inset-0 grain" style={{opacity:.55}}/>
      {/* vignette */}
      <div className="absolute inset-0 pointer-events-none" style={{boxShadow:"inset 0 0 170px 46px rgba(0,0,0,.82)"}}/>
      {/* top + bottom scrims for status bar / lockup / buttons */}
      <div className="absolute inset-0 pointer-events-none" style={{background:"linear-gradient(180deg, rgba(13,14,16,.72) 0%, rgba(13,14,16,0) 24%, rgba(13,14,16,0) 46%, rgba(13,14,16,.92) 100%)"}}/>
    </div>
  );
}

/* ========== 00 — ONBOARDING ========== */
/* Step indicator — numbered circles joined by a hairline, current = accent fill
   (kit 05 progress pattern). `dark` forces the cream-on-dark palette on the
   hardcoded takeover screens so it reads in both themes. Visual only. */
function Steps({ current, total=3, dark=false, className="" }){
  const accent    = dark ? "#F7F6F3" : "var(--ice)";
  const accentInk = dark ? "#121315" : "var(--ice-ink)";
  const line      = dark ? "rgba(247,246,243,.22)" : "var(--line-2)";
  const mute      = dark ? "rgba(247,246,243,.55)" : "var(--ink-mute)";
  return (
    <div className={"flex items-center "+className} aria-hidden="true">
      {Array.from({length: total}, (_,i)=>i+1).map(n=>(
        <React.Fragment key={n}>
          {n>1 && <span style={{width:24, height:1, background:line}}/>}
          <span className="rounded-full flex items-center justify-center font-mono text-[11px]"
            style={n===current
              ? {width:24, height:24, background:accent, color:accentInk}
              : {width:24, height:24, border:"1px solid "+line, color:mute}}>
            {n}
          </span>
        </React.Fragment>
      ))}
    </div>
  );
}

function ScreenOnboard({ step, setStep, onComplete, onProfileFetched }){
  const [phone, setPhone] = useState("");
  const [handle, setHandle] = useState("");
  const canSubmit = phone.length >= 6 && handle.length >= 2;

  const submit = async () => {
    setStep('reviewing');
    // Real prod: POST /api/onboard → backend hits whichever creator-data
    // provider we settle on. Prototype mocks client-side using the agreed
    // normalized shape so the provider can swap later without UI changes.
    try {
      const profile = await mockCreatorDataFetch(handle);
      onProfileFetched(profile);
      setStep('tier-reveal');
    } catch (err) {
      // handle not found / provider error → recoverable, send them back to retry
      setStep('error');
    }
  };

  if (step === 'intro') return (
    <div className="absolute inset-0 anim-fade" style={{background:"#0D0E10", color:"#F7F6F3"}}>
      <IntroVideoBG/>
      <StatusBar/>
      <div className="absolute inset-0 z-10 flex flex-col px-7 pt-[120px] pb-10">
        {/* Centered wordmark lockup — serif wordmark, sentence-case copy */}
        <div className="flex-1 flex flex-col items-center justify-center text-center -mt-6">
          <div className="anim-fade" style={{fontSize:11, fontWeight:500, letterSpacing:".02em", color:"rgba(247,246,243,.78)"}}>Est. MMXXVI · Beirut</div>
          <div className="font-black font-display-l anim-up" style={{fontSize:66, lineHeight:.88, marginTop:14, textShadow:"0 2px 40px rgba(0,0,0,.6)"}}>The<br/>List</div>
          <div className="anim-up" style={{marginTop:18, fontSize:13, letterSpacing:".01em", color:"rgba(247,246,243,.82)"}}>By invitation only</div>
        </div>

        {/* Bottom actions — solid Apply (accent) + ghost invite, TSS pattern */}
        <div className="flex flex-col gap-3 anim-up">
          <button onClick={()=>setStep('phone')} className="press glow-primary w-full h-[58px] rounded-full font-semibold text-[15px] flex items-center justify-center gap-2.5" style={{background:"#F7F6F3", color:"#121315"}}>
            <span>Apply for access</span>
            <Icon name="arrow-right" size={16} stroke={1.6}/>
          </button>
          <button onClick={()=>setStep('phone')} className="press w-full h-[58px] rounded-full font-medium text-[13px]" style={{background:"transparent", color:"#F7F6F3", border:"1px solid rgba(247,246,243,.32)"}}>
            I have an invite
          </button>
        </div>

        {/* Business door — venues sign in on the other side */}
        <div className="flex items-center gap-3 mt-4 anim-up" style={{opacity:.9}}>
          <div className="flex-1 h-px" style={{background:"rgba(247,246,243,.16)"}}/>
          <div className="stamp" style={{color:"rgba(247,246,243,.6)"}}>or</div>
          <div className="flex-1 h-px" style={{background:"rgba(247,246,243,.16)"}}/>
        </div>
        <button onClick={()=>{ window.location.href = "./venue.html"; }}
          className="press w-full h-[52px] rounded-full font-medium text-[12px] anim-up mt-3"
          style={{background:"transparent", color:"#F7F6F3", border:"1px solid rgba(247,246,243,.32)"}}>
          List your venue · Business
        </button>
      </div>
      <HomeIndicator/>
    </div>
  );

  if (step === 'phone') return (
    <div className="absolute inset-0 anim-fade" style={{background:"var(--bg)"}}>
      <StatusBar/>
      <div className="absolute inset-0 flex flex-col px-7 pt-[110px] pb-10">
        <div className="stamp wordmark">The List · No. 048</div>
        <Steps current={1} className="mt-4"/>
        <div className="font-black font-display-l text-[44px] leading-[.95] mt-3">Apply</div>
        <div className="text-[13px] mt-3 max-w-[280px]" style={{color:"var(--ink-2)"}}>By invitation only. We review every profile manually. Approval typically takes 24 hours.</div>

        <div className="mt-10 space-y-5">
          <div>
            <div className="stamp mb-2">Phone</div>
            <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+961 71 000 000" className="w-full h-12 px-3 rounded-[12px] text-[15px]" style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}/>
          </div>
          <div>
            <div className="stamp mb-2">Instagram handle</div>
            <div className="flex h-12 rounded-[12px] overflow-hidden" style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)"}}>
              <div className="px-3 flex items-center text-[15px]" style={{color:"var(--ink-mute)"}}>@</div>
              <input value={handle} onChange={e=>setHandle(e.target.value)} placeholder="capriottisara" className="flex-1 bg-transparent text-[15px] pr-3 focus:outline-none" style={{color:"var(--ink)"}}/>
            </div>
          </div>
        </div>

        <div className="flex-1"/>

        <button onClick={submit} disabled={!canSubmit} className={"press w-full h-[58px] rounded-full font-semibold text-[15px] flex items-center justify-center gap-2.5 "+(canSubmit?"glow-primary":"")} style={{background: canSubmit ? "var(--ice)" : "var(--bg-elev2)", color: canSubmit ? "var(--ice-ink)" : "var(--ink-mute)"}}>
          <span>Apply for access</span>
          <Icon name="arrow-right" size={16} stroke={1.6}/>
        </button>
        <div className="text-center text-[11px] mt-3" style={{color:"var(--ink-mute)"}}>No password. We verify through your Instagram.</div>
      </div>
      <HomeIndicator/>
    </div>
  );

  if (step === 'reviewing') return (
    <div className="absolute inset-0 anim-fade" style={{background:"#121315", color:"#F7F6F3"}}>
      <StatusBar/>
      <div className="absolute top-[110px] left-0 right-0 flex justify-center">
        <Steps current={2} dark/>
      </div>
      <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-7">
        <div className="w-[160px] h-[160px] rounded-full border-2 flex items-center justify-center" style={{borderColor:"rgba(247,246,243,.2)"}}>
          <div className="w-[120px] h-[120px] rounded-full border-2 spin" style={{borderColor:"rgba(247,246,243,.3)", borderTopColor:"#F7F6F3"}}/>
        </div>
        <div className="font-black font-display-l text-[28px] mt-10">Reading</div>
        <div className="text-[13px] mt-3 max-w-[260px]">Pulling @{handle || "your-handle"}'s reach, demographics, and engagement.</div>
      </div>
      <HomeIndicator/>
    </div>
  );

  if (step === 'error') return (
    <div className="absolute inset-0 anim-fade" style={{background:"#121315", color:"#F7F6F3"}}>
      <StatusBar/>
      <div className="absolute inset-0 flex flex-col px-7 pt-[110px] pb-10">
        <div className="stamp wordmark" style={{color:"rgba(247,246,243,.7)"}}>The List · No. 048</div>
        <div className="flex-1 flex flex-col justify-center items-center text-center">
          <div className="w-[120px] h-[120px] rounded-full flex items-center justify-center" style={{border:"2px solid rgba(247,246,243,.25)", color:"rgba(247,246,243,.85)"}}>
            <Icon name="x" size={40} stroke={1.4}/>
          </div>
          <div className="font-black font-display-l text-[30px] leading-[.95] mt-10">Couldn't<br/>read that</div>
          <div className="text-[13px] mt-3 opacity-75 max-w-[280px]">We couldn't pull @{handle || "your-handle"} from Instagram. Check the spelling, or try another handle.</div>
        </div>
        <button onClick={()=>setStep('phone')} className="press glow-primary w-full h-[58px] rounded-full font-semibold text-[15px]" style={{background:"#F7F6F3", color:"#121315"}}>
          Try another handle

      </div>
      <HomeIndicator/>

  // tier-reveal
  return (
    <div className="absolute inset-0 anim-fade" style={{background:"#121315", color:"#F7F6F3"}}>
      <StatusBar/>
      <div className="absolute inset-0 flex flex-col px-7 pt-[110px] pb-10">
        <div className="stamp wordmark picked-stagger" style={{color:"rgba(247,246,243,.7)", animationDelay:"0ms"}}>The List · invitation</div>
        <Steps current={3} dark className="mt-4 picked-stagger"/>

        <div className="flex-1 flex flex-col justify-center items-center text-center">
          <div className="ring-pop w-[180px] h-[180px] rounded-full flex items-center justify-center" style={{border:"2px solid #F7F6F3", color:"#F7F6F3", animationDelay:"120ms", boxShadow:"inset 0 0 0 7px rgba(247,246,243,.12)"}}>
            <div className="font-black text-[36px] leading-none">Tier<br/>One</div>
          </div>
          <div className="font-black font-display-l text-[34px] leading-[.95] mt-10 picked-stagger" style={{animationDelay:"680ms"}}>Listed</div>
          <div className="text-[13px] mt-3 opacity-80 max-w-[280px] picked-stagger" style={{animationDelay:"820ms"}}>Your audience fits the rooms. Tier reviews happen quarterly.</div>
        </div>

        <button onClick={onComplete} className="press glow-primary w-full h-[58px] rounded-full font-semibold text-[15px] flex items-center justify-center gap-2.5 picked-stagger" style={{background:"#F7F6F3", color:"#121315", animationDelay:"1100ms"}}>
          <span>Enter The List</span>
          <Icon name="arrow-right" size={16} stroke={1.6}/>
        </button>
      </div>
      <HomeIndicator/>
    </div>
  );
}

/* ========== APP — navigation state ========== */
function App(){
  const [onboardStep, setOnboardStep] = useState("intro"); // intro | phone | reviewing | tier-reveal | error | done
  const [screen, setScreen] = useState("home");           // home | explore | detail | mylist | profile | picked
  const [tab, setTab] = useState("home");
  const [currentEvent, setCurrentEvent] = useState(null);
  const [applyState, setApplyState] = useState("idle");   // idle | submitting | submitted
  const [confirmedEvent, setConfirmedEvent] = useState(null);
  const [light, setLight] = useState(false);
  const [profile, setProfile] = useState(null);       // creator-data provider response (vendor-neutral)
  const [saved, setSaved] = useState([]);             // saved / bookmarked event ids
  const [shareEvent, setShareEvent] = useState(null); // event being shared (null = sheet closed)
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);  // Activity sheet (bell on Home)
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  useEffect(() => {
    document.documentElement.classList.toggle('light', light);
  }, [light]);

  const goTab = (id) => {
    setTab(id);
    if (id === "home")    setScreen("home");
    if (id === "explore") setScreen("explore");
    if (id === "mylist")  setScreen("mylist");
    if (id === "profile") setScreen("profile");
    setApplyState("idle");
  };

  const pickEvent = (e) => {
    setCurrentEvent(e);
    setApplyState("idle");
    setScreen("detail");
  };

  const onApply = () => {
    setApplyState("submitting");
    setTimeout(() => setApplyState("submitted"), 1400);
    setTimeout(() => setScreen("picked"), 2200);
  };

  const onConfirmPick = () => {
    setConfirmedEvent(currentEvent);
    setScreen("mylist");
    setTab("mylist");
  };

  const onDeclinePick = () => {
    setScreen("detail");
  };

  const showToast = (msg) => {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2200);
  };

  const toggleSave = (id) => {
    const wasSaved = saved.includes(id);
    setSaved(s => wasSaved ? s.filter(x => x !== id) : [...s, id]);
    showToast(wasSaved ? "Removed from saved" : "Saved to your list");
  };

  // Verify-with-Instagram: flips the (vendor-neutral) creator data to verified.
  const onVerify = () => {
    setProfile(p => ({ ...(p || SEED_PROFILE), data_status: "verified" }));
    setSettingsOpen(false);
    showToast("Instagram connected · verified");
  };

  const savedEvents = useMemo(() => EVENTS.filter(e => saved.includes(e.id)), [saved]);

  const skipOnboarding = () => setOnboardStep("done");
  const onboardActive = onboardStep !== "done";

  return (
    <div className="min-h-screen w-full flex flex-col items-center pt-20 pb-24">
      <button className="theme-toggle" onClick={() => setLight(l => !l)}>
        <span className="dot"></span>
        {light ? 'Light' : 'Dark'} · switch
      </button>
      {onboardActive && (
        <button className="theme-toggle" style={{right:140}} onClick={skipOnboarding}>
          Skip onboarding
        </button>
      )}

      <div className="mb-8 text-center">
        <div className="stamp" style={{color:"var(--ink-mute)"}}>The List · Influencer side · Prototype v0.3</div>
        <div className="font-black text-[28px] leading-none mt-2">Tap through Sara's flow</div>
        <div className="text-[12px] mt-2" style={{color:"var(--ink-mute)"}}>{onboardActive ? "Grainy entry splash → apply → review → tier reveal." : "Tap an event → Apply → wait for the venue to pick you."}</div>
      </div>

      <div className="iphone">
        <div className="iphone-screen">
          {onboardActive && <ScreenOnboard step={onboardStep} setStep={setOnboardStep} onComplete={skipOnboarding} onProfileFetched={setProfile}/>}
          {!onboardActive && screen === "home"    && <ScreenHome    tab={tab} onTab={goTab} onPickEvent={pickEvent} saved={saved} onToggleSave={toggleSave} confirmedEvent={confirmedEvent} onBell={()=>setNotifOpen(true)}/>}
          {!onboardActive && screen === "explore" && <ScreenExplore tab={tab} onTab={goTab} onPickEvent={pickEvent} saved={saved} onToggleSave={toggleSave} onToast={showToast}/>}
          {!onboardActive && screen === "detail"  && <ScreenEventDetail event={currentEvent} applyState={applyState} onBack={()=>setScreen(tab==="explore"?"explore":"home")} onApply={onApply} onShare={()=>setShareEvent(currentEvent)} saved={saved} onToggleSave={toggleSave} onToast={showToast}/>}
          {!onboardActive && screen === "mylist"  && <ScreenMyEvents tab={tab} onTab={goTab} confirmedEvent={confirmedEvent} savedEvents={savedEvents} onToggleSave={toggleSave} onPickEvent={pickEvent} onToast={showToast}/>}
          {!onboardActive && screen === "profile" && <ScreenProfile tab={tab} onTab={goTab} profile={profile} onSettings={()=>setSettingsOpen(true)} onVerify={onVerify}/>}
          {!onboardActive && screen === "picked"  && <ScreenPicked event={currentEvent} onConfirm={onConfirmPick} onLater={onDeclinePick}/>}

          {/* Overlays — scoped to the phone frame */}
          {!onboardActive && <ShareSheet event={shareEvent} onClose={()=>setShareEvent(null)} onToast={showToast}/>}
          {!onboardActive && settingsOpen && <SettingsSheet profile={profile} light={light} setLight={setLight} onClose={()=>setSettingsOpen(false)} onToast={showToast}/>}
          {!onboardActive && notifOpen && <NotificationsSheet onClose={()=>setNotifOpen(false)} onPickEvent={pickEvent}/>}
          <Toast msg={toast}/>
        </div>
      </div>

      <div className="mt-8 text-center max-w-[420px]">
        <div className="stamp mb-2" style={{color:"var(--ink-mute)"}}>How to use</div>
        <div className="text-[12px]" style={{color:"var(--ink-2)"}}>
          {onboardActive
            ? "Entry splash plays the grainy Beirut montage. Tap Apply for access, type anything in the two fields, watch the review animation, tap Enter The List on the tier reveal."
            : "Tap any event card, hit Apply → “You're in” slides up → Confirm lands in Invites. Bookmark a card to fill the Saved tab. Profile → gear opens Settings; Connect verifies. Share opens from the event header. Filters pill on Index opens the sheet."}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
