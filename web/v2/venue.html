<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">

<style>
  /* Kit V.2 — dark = Warm Cream Scale (primary), light = Anthracite Scale.
     Var NAMES kept (--ice etc.) so call sites don't churn; --ice is now the
     kit accent: warm cream on dark, brand anthracite on light. */
  :root{
    --bg:        #121315;
    --bg-elev:   #1B1C1F;
    --bg-elev2:  #232428;
    --ink:       #F7F6F3;
    --ink-2:     #EDECE6;
    --ink-mute:  #D8D4C7;
    --line:      rgba(247,246,243,0.10);
    --line-2:    rgba(247,246,243,0.18);
    --ice:       #F7F6F3;
    --ice-dim:   #D8D4C7;
    --ice-ink:   #121315;
    --page:      #0D0E10;
  }
  html.light{
    --bg:        #F7F6F3;
    --bg-elev:   #FFFFFF;
    --bg-elev2:  #ECEAE3;
    --ink:       #1E1E1E;
    --ink-2:     #454B52;
    --ink-mute:  #6A737D;
    --line:      rgba(30,30,30,0.08);
    --line-2:    rgba(30,30,30,0.15);
    --ice:       #2A2D31;
    --ice-dim:   #454B52;
    --ice-ink:   #FFFFFF;
    --page:      #F2F0EB;
  }
  html, body {
    background: var(--page);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }
  /* Two families per Kit V.2: Cormorant Garamond 600 for display moments
     (screen titles, venue/event names, the wordmark), Plus Jakarta Sans for
     everything else. No third family. Doubled .font-black.font-black beats
     Tailwind CDN's own .font-black utility (font-weight:900), which would
     otherwise fake-bold the serif to 900. */
  .font-black.font-black,
  .font-display {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .font-display-l {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  /* font-mono = legacy class for numbers/timers. Numbers stay sans per kit:
     Plus Jakarta Sans 600 with tabular figures so timers don't jitter.
     Doubled selector (.font-mono.font-mono) so it beats Tailwind CDN's own .font-mono
     utility, which otherwise forces a system monospace stack (and beats .font-black
     so numbers never go serif). */
  .font-mono.font-mono {
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* hide scrollbars inside phone screens */
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width: none; }

  /* iphone bezel */
  .iphone {
    width: 393px; height: 852px;
    border-radius: 54px;
    padding: 11px;
    background: linear-gradient(140deg,#2a2722 0%, #0c0a08 45%, #1d1a16 100%);
    box-shadow:
      inset 0 0 0 1.5px #3a3631,
      inset 0 0 0 3px #0a0807,
      0 60px 80px -40px rgba(0,0,0,.9),
      0 30px 60px -30px rgba(0,0,0,.6);
    position: relative;
  }
  .iphone-screen {
    width: 100%; height: 100%; border-radius: 43px;
    overflow: hidden; position: relative; background: var(--bg);
    isolation: isolate;
  }
  .island { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#000; border-radius:20px; z-index:50; }

  .statusbar { position:absolute; top:0; left:0; right:0; height:54px; padding: 16px 28px 0; display:flex; justify-content:space-between; align-items:flex-start; z-index:40; font-family:'Plus Jakarta Sans', sans-serif; font-weight:600; font-variant-numeric: tabular-nums; font-size:14px; color: var(--ink); pointer-events:none; }
  .statusbar svg { width: 16px; height: 16px; }

  .tabbar {
    position:absolute; left:0; right:0; bottom:0; height: 88px;
    padding: 12px 18px 30px;
    display:grid; grid-template-columns:repeat(4,1fr); gap: 4px;
    background: linear-gradient(180deg, rgba(18,19,21,0) 0%, rgba(18,19,21,.72) 45%, rgba(18,19,21,.92) 100%);
    backdrop-filter: blur(22px) saturate(1.3);
    -webkit-backdrop-filter: blur(22px) saturate(1.3);
    z-index: 30;
    border-top: 1px solid var(--line);
    box-shadow: 0 -12px 34px -24px rgba(0,0,0,.55);
  }
  html.light .tabbar {
    background: linear-gradient(180deg, rgba(247,246,243,0) 0%, rgba(247,246,243,.72) 45%, rgba(247,246,243,.92) 100%);
    box-shadow: 0 -12px 34px -26px rgba(30,30,30,.22);
  }
  .tabbar button {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px; color: var(--ink-mute);
    font-size: 9px; letter-spacing: 0.02em;
    padding: 4px 0; border-radius: 14px;
    transition: color .15s;
    background: transparent; border: 0; cursor: pointer;
  }
  .tabbar button.active { color: var(--ink); }
  .tabbar button.active svg { color: var(--ice); }

  .hr { height: 1px; background: var(--line); }
  .hr-2 { height: 1px; background: var(--line-2); }

  /* Sentence case everywhere per Will's ruling — no tracked caps. */
  .stamp { font-family:'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 0.02em; color: var(--ink-mute); }
  .smallcaps { letter-spacing: 0.02em; font-size: 10px; font-weight: 500; }
  /* Calmer section marker — a heavier sentence-case beat than the quiet .stamp.
     Used for section dividers; .stamp stays for true value labels (When/Doors/Seats). */
  .section-label { font-family:'Plus Jakarta Sans', ui-sans-serif, system-ui; font-weight: 700; font-size: 14px; letter-spacing: normal; color: var(--ink-2); }

  .chip-ice { background: var(--ice); color: var(--ice-ink); }
  .chip-outline { border: 1px solid var(--line-2); color: var(--ink); }

  .press { transition: transform .12s ease, opacity .12s ease, background .2s, border-color .2s, box-shadow .2s; cursor: pointer; }
  @media (hover:hover){ .press:hover { opacity: .96; } }
  .press:active { transform: scale(.97); opacity: .85; }

  .vt { writing-mode: vertical-rl; transform: rotate(180deg); }

  /* film grain */
  .grain::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: overlay;
    pointer-events: none;
  }

  .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(247,246,243,.03), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(247,246,243,.02), transparent 60%),
      var(--page);
  }
  html.light .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(42,45,49,.05), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(42,45,49,.03), transparent 60%),
      var(--page);
  }

  .theme-toggle {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display:flex; align-items:center; gap:8px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--line-2);
    color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500;
    font-size: 10px; letter-spacing: 0.02em;
    cursor: pointer; transition: all .2s;
  }
  .theme-toggle:hover { border-color: var(--ice); color: var(--ice); }
  .theme-toggle .dot { width:6px; height:6px; border-radius:50%; background: var(--ice); }

  .side-link {
    position: fixed; top: 24px; left: 24px; z-index: 100;
    display:flex; align-items:center; gap:8px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--line-2);
    color: var(--ink); font-size: 10px; letter-spacing: 0.02em;
    font-weight:500; text-decoration:none; transition: all .2s;
  }
  .side-link:hover { border-color: var(--ice); color: var(--ice); }

  @keyframes pulseIce {
    0% { box-shadow: 0 0 0 0 rgba(247,246,243,.30); }
    100% { box-shadow: 0 0 0 28px rgba(247,246,243,0); }
  }
  .pulse-ice { animation: pulseIce 1.8s cubic-bezier(.4,.2,.2,1) infinite; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .anim-up { animation: slideUp .5s cubic-bezier(.2,.7,.2,1); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .anim-fade { animation: fadeIn .35s ease; }

  /* Stagger entrance for list children. Each child sets style={{"--i": index}}. */
  .stagger > * { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    @keyframes staggerUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .stagger > * {
      animation: staggerUp .45s ease-out both;
      animation-delay: calc(var(--i, 0) * 60ms);
    }
  }

  /* Picked screen — ring scale-in + content stagger */
  @keyframes ringPop {
    0%   { transform: scale(.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pickedFadeUp {
    from { transform: translateY(14px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .ring-pop { animation: ringPop .8s cubic-bezier(.2,.7,.2,1) backwards; }
  .picked-stagger { animation: pickedFadeUp .55s ease-out backwards; }

  /* Filter sheet — backdrop dim + sheet slide up */
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes dimIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .sheet-backdrop { animation: dimIn .25s ease; }
  .sheet { animation: sheetIn .35s cubic-bezier(.2,.7,.2,1); }

  /* Submit spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin .9s linear infinite; }

  /* ===== polish pass: glass depth + quiet neutral shadows (no neon) ===== */
  /* frosted glass for top controls — tinted to the kit palette */
  .glass {
    background: rgba(24,25,28,.55) !important;
    backdrop-filter: blur(16px) saturate(1.3);
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
    border: 1px solid rgba(247,246,243,.12) !important;
  }
  html.light .glass {
    background: rgba(255,255,255,.6) !important;
    border-color: rgba(30,30,30,.1) !important;
  }
  /* solid cards per kit: surface fill + hairline + soft shadow */
  .card {
    /* Flat-At-Rest: resting cards are NOT glass. Solid fill + hairline +
       soft shadow only. Blur is reserved for genuinely-floating surfaces. */
    background: #1B1C1F;
    border: 1px solid var(--line);
    box-shadow: 0 16px 36px -24px rgba(0,0,0,.8);
    transition: border-color .2s, box-shadow .2s, transform .12s;
  }
  html.light .card {
    /* #7 — firmer edge so cards read as objects on cream, not flat panels. */
    background: #FFFFFF;
    border-color: var(--line);
    box-shadow: 0 10px 30px -18px rgba(30,30,30,.25);
  }
  @media (hover:hover){ button.card:hover, .card.press:hover { border-color: rgba(247,246,243,.28); } }
  @media (hover:hover){ html.light button.card:hover, html.light .card.press:hover { border-color: rgba(42,45,49,.35); } }
  /* quiet rings + neutral depth — active + pressed states only */
  .glow-ice { box-shadow: 0 0 0 1px rgba(247,246,243,.18), 0 10px 24px -14px rgba(0,0,0,.6); }
  .press.glow-primary:active { box-shadow: 0 12px 28px -14px rgba(0,0,0,.7); }
  @media (hover:hover){ .glow-primary:hover { box-shadow: 0 10px 26px -14px rgba(0,0,0,.6); } }
  /* light theme: a tighter anthracite ring, neutral shadow — nothing bright. */
  html.light .glow-ice { box-shadow: 0 0 0 1px rgba(42,45,49,.22), 0 3px 12px -6px rgba(30,30,30,.25); }
  html.light .press.glow-primary:active { box-shadow: 0 8px 18px -10px rgba(30,30,30,.35); }
  @media (hover:hover){ html.light .glow-primary:hover { box-shadow: 0 5px 16px -8px rgba(30,30,30,.30); } }
  /* ornamental texture — only paints outside the (opaque) phone */
  body::before {
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image: radial-gradient(rgba(247,246,243,.05) 1px, transparent 1px);
    background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(120% 90% at 50% 42%, transparent 320px, #000 760px);
    mask-image: radial-gradient(120% 90% at 50% 42%, transparent 320px, #000 760px);
  }
  html.light body::before { background-image: radial-gradient(rgba(42,45,49,.08) 1px, transparent 1px); }

  .profile-hero-overlay {
    background: linear-gradient(180deg, rgba(18,19,21,.3) 0%, rgba(18,19,21,0) 40%, var(--bg) 100%);
  }
  html.light .profile-hero-overlay {
    background:
      linear-gradient(180deg, rgba(247,246,243,.08) 0%, rgba(247,246,243,0) 36%, rgba(247,246,243,.98) 100%),
      linear-gradient(180deg, rgba(30,30,30,.08) 0%, rgba(30,30,30,0) 28%);
  }
  /* #5 — one canonical "floating control over a photo" recipe. Event Detail
     header buttons and the Profile hero controls share it, so there is a single
     over-image glass, distinct from .glass (which floats over the app bg). */
  .glass-over-image, .profile-glass {
    background: rgba(18,19,21,.5);
    border: 1px solid rgba(247,246,243,.18);
    backdrop-filter: blur(12px) saturate(1.25);
    -webkit-backdrop-filter: blur(12px) saturate(1.25);
  }
  html.light .glass-over-image, html.light .profile-glass {
    background: rgba(255,255,255,.72);
    border-color: rgba(30,30,30,.12);
    box-shadow: 0 12px 28px -22px rgba(30,30,30,.35);
  }
  /* Profile keeps its own text-color contract on top of the shared glass. */
  .profile-glass { color: #F7F6F3; }
  html.light .profile-glass { color: #1E1E1E; }
  .profile-hero-text { color: #F7F6F3; }
  .profile-hero-muted { color: rgba(247,246,243,.72); }
  html.light .profile-hero-text { color: #1E1E1E; }
  html.light .profile-hero-muted { color: rgba(30,30,30,.58); }
  html.light .profile-hero-text .stamp,
  html.light .profile-hero-text .smallcaps { color: rgba(30,30,30,.58) !important; }
</style>
</head>

    return (

           viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke}
           aria-hidden="true" style={{flexShrink:0}}
           dangerouslySetInnerHTML={{__html: inner}}/>
    );
  }

  // Transient toast inside the phone frame — copied VERBATIM from index.html.
  // Gives minor controls a visible reply.
  function Toast({ msg }){
    if(!msg) return null;
    return (
      <div className="absolute left-0 right-0 flex justify-center z-[60] pointer-events-none" style={{bottom:104}}>
        <div key={msg} className="anim-up px-4 py-2.5 rounded-full glass-over-image text-[12px] flex items-center gap-2" style={{maxWidth:"82%"}}>
          <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:"var(--ice)"}}/>
          <span className="truncate">{msg}</span>

      </div>
    );
  }

  // Renders an image cropped to a fixed aspect frame using a stored transform.
  // value: { src, scale, x, y } | null. ratio: e.g. "4/5". Empty state when null.
  function FramedImage({ value, ratio="4/5", className="", empty="No image" }){
    return (
      <div className={"relative overflow-hidden rounded-[14px] "+className}
           style={{aspectRatio:ratio, background:"var(--bg-elev)"}}>
        {value && value.src ? (
          <img src={value.src} alt="" draggable={false}
            style={{position:"absolute", left:"50%", top:"50%",
                    transform:`translate(-50%,-50%) translate(${value.x||0}px,${value.y||0}px) scale(${value.scale||1})`,
                    maxWidth:"none", minWidth:"100%", minHeight:"100%", userSelect:"none"}}/>
        ) : (
          <div className="absolute inset-0 flex items-center justify-center stamp" style={{color:"var(--ink-mute)"}}>{empty}</div>
        )}
      </div>
    );
  }

  // Pick a local file, drag + zoom inside a fixed-aspect frame, return {src,scale,x,y}.
  // No upload, no canvas export — the transform is reused by FramedImage everywhere.
  function ImageCropper({ ratio="4/5", value, onChange, onCancel, label="Position your image" }){
    const [src, setSrc]   = useState(value?.src || null);
    const [scale, setScale] = useState(value?.scale || 1);
    const [pos, setPos]   = useState({ x: value?.x || 0, y: value?.y || 0 });
    const drag = useRef(null);
    const fileRef = useRef(null);

    const pick = (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { setSrc(r.result); setScale(1); setPos({x:0,y:0}); };
      r.readAsDataURL(f);
    };
    const onDown = (e) => { const p = e.touches?e.touches[0]:e; drag.current = { x:p.clientX-pos.x, y:p.clientY-pos.y }; };
    const onMove = (e) => { if(!drag.current) return; const p = e.touches?e.touches[0]:e;
                            setPos({ x:p.clientX-drag.current.x, y:p.clientY-drag.current.y }); };
    const onUp   = () => { drag.current = null; };

    return (
      <div className="flex flex-col gap-4">
        <div className="stamp" style={{color:"var(--ink-mute)"}}>{label}</div>
        <div className="relative overflow-hidden rounded-[14px] mx-auto w-full"
             style={{aspectRatio:ratio, background:"var(--bg-elev)", touchAction:"none"}}
             onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
             onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}>
          {src ? (
            <img src={src} alt="" draggable={false}
              style={{position:"absolute", left:"50%", top:"50%",
                      transform:`translate(-50%,-50%) translate(${pos.x}px,${pos.y}px) scale(${scale})`,
                      maxWidth:"none", minWidth:"100%", minHeight:"100%", userSelect:"none"}}/>
          ) : (
            <button onClick={()=>fileRef.current.click()}
              className="absolute inset-0 flex flex-col items-center justify-center gap-2">
              <Icon name="plus" size={28} stroke={1.4}/>
              <span className="stamp">Choose a file</span>
            </button>
          )}
        </div>
        <input ref={fileRef} type="file" accept="image/*" onChange={pick} style={{display:"none"}}/>
        {src && (
          <div className="flex items-center gap-3">
            <Icon name="magnifying-glass" size={16}/>
            <input type="range" min="1" max="3" step="0.01" value={scale}
                   onChange={e=>setScale(parseFloat(e.target.value))} className="flex-1"/>
            <button onClick={()=>fileRef.current.click()} className="stamp" style={{color:"var(--ice)"}}>Replace</button>
          </div>
        )}
        <div className="flex gap-3">
          <button onClick={onCancel} className="press flex-1 h-[52px] rounded-full text-[12px] font-medium"
                  style={{border:"1px solid var(--line-2)", color:"var(--ink)"}}>Cancel</button>
          <button disabled={!src} onClick={()=>onChange({ src, scale, x:pos.x, y:pos.y })}
                  className="press flex-1 h-[52px] rounded-full text-[12px] font-semibold"
                  style={{background: src?"var(--ice)":"var(--bg-elev2)", color: src?"var(--ice-ink)":"var(--ink-mute)"}}>
            Use this
          </button>
        </div>
      </div>
    );
  }

  /* ========== shared atoms — same vocabulary as index.html ========== */
  // Timers: tighter dimmed colons, digits carry the weight.
  function Countdown({ value, className="", style={} }){
    const parts = String(value).split(":");
    return (
      <span className={"font-mono "+className} style={style}>
        {parts.map((p,i)=>(
          <React.Fragment key={i}>
            {i>0 && <span style={{opacity:.4, margin:"0 .06em"}}>:</span>}
            {p}
          </React.Fragment>
        ))}
      </span>
    );
  }

  function StatusPill({ label, tone="neutral", dot=false }){
    const style = tone==="ice" ? {background:"var(--ice)", color:"var(--ice-ink)"}
      : tone==="outline" ? {border:"1px solid var(--line-2)", color:"var(--ink)"}
      : {background:"var(--bg-elev2)", color:"var(--ink)"};
    return (
      <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-medium" style={style}>
        {dot && <span className="w-1.5 h-1.5 rounded-full" style={{background: tone==="ice" ? "var(--ice-ink)" : "var(--ice)"}}/>}
        {label}
      </span>
    );
  }

  function DateChip({ day, sub, tone="neutral" }){
    const style = tone==="ice" ? {background:"var(--ice)", color:"var(--ice-ink)"} : {background:"var(--bg-elev2)", color:"var(--ink)"};
    return (
      <div className="rounded-[12px] flex flex-col items-center justify-center shrink-0" style={{ width:48, height:54, ...style }}>
        <div className="font-black font-mono text-[20px] leading-none">{day}</div>
        <div className="text-[9px] mt-0.5" style={{opacity:.8}}>{sub}</div>
      </div>
    );
  }

  function SectionHead({ label, right, className="" }){
    return (
      <div className={"px-5 flex items-center justify-between "+className}>
        <div className="flex items-center gap-2.5">
          <span className="rounded-full" style={{ width:3, height:15, background:"var(--ice)" }}/>
          <span className="section-label">{label}</span>
        </div>
        {right != null && (
          <span className="text-[10px] font-medium px-2.5 py-1 rounded-full" style={{border:"1px solid var(--line-2)", color:"var(--ink)"}}>{right}</span>
        )}
      </div>
    );
  }

  function Segmented({ items, value, onChange }){
    return (
      <div className="flex gap-1 p-1 rounded-full" style={{ background:"var(--bg-elev)", border:"1px solid var(--line)" }}>
        {items.map(it=>{
          const on = it.id===value;
          return (
            <button key={it.id} onClick={()=>onChange(it.id)} className="press flex-1 h-9 rounded-full flex items-center justify-center gap-1 text-[10px] font-medium"
              style={on ? {background:"var(--ink)", color:"var(--bg)"} : {color:"var(--ink)", opacity:.6}}>
              <span>{it.label}</span>
              {it.count != null && <span style={{opacity:.65}}>{it.count}</span>}
            </button>
          );
        })}
      </div>
    );
  }

  /* TSS-style widget stat tile: big number top, small label under.
     Ice only on the one number that matters per screen. */
  function StatTile({ n, label, ice=false, onClick }){
    const cls = "card rounded-[16px] p-4 text-left w-full" + (onClick ? " press" : "");
    const body = (
      <>
        <div className="font-black font-mono text-[26px] leading-none" style={ice?{color:"var(--ice)"}:undefined}>{n}</div>
        <div className="stamp mt-1.5" style={{opacity:.75}}>{label}</div>
      </>
    );
    return onClick
      ? <button onClick={onClick} className={cls}>{body}</button>
      : <div className={cls}>{body}</div>;
  }

  /* ========== ScreenDoor — night-of check-in + scoring ========== */
  function ScreenDoor({ pool, onToast }){
    const [seg, setSeg] = useState("expected");
    const [inIds, setInIds] = useState(["a1","a3"]);
    const [noShowIds, setNoShowIds] = useState([]);
    const [rated, setRated] = useState([]);
    const [rateFor, setRateFor] = useState(null);
    const [score, setScore] = useState(9);

    const expected = pool.filter(g=>!inIds.includes(g.id) && !noShowIds.includes(g.id));
    const checkedIn = pool.filter(g=>inIds.includes(g.id));
    const noShows = pool.filter(g=>noShowIds.includes(g.id));
    const list = seg==="expected" ? expected : seg==="in" ? checkedIn : noShows;

    const checkIn = (g)=>{ setInIds(ids=>[...ids, g.id]); onToast(g.name.split(" ")[0]+" checked in · 22:41"); };
    const noShow = (g)=>{ setNoShowIds(ids=>[...ids, g.id]); onToast("Marked no-show — counts on their record"); };
    const submitScore = ()=>{
      setRated(r=>[...r, rateFor.id]);
      onToast("Scored "+score+" · feeds their reputation");
      setRateFor(null); setScore(9);
    };

    return (
      <div className="absolute inset-0 flex flex-col" style={{background:"var(--bg)"}}>
        <StatusBar/>

  /* ========== ScreenReview — swipe deck ========== */
  function ScreenReview({ event, pool, onClose, picked, setPicked }){
    // picked state lives in App so the desk tiles move when you swipe.
    const [idx, setIdx] = useState(0);
    const t = tally(picked, pool);
    const target = event.mix;                    // {girls,guys} | null
    const done = idx >= pool.length;
    const a = pool[idx];

    const decide = (yes) => {
      if (yes && a) setPicked(p => [...p, a.id]);
      setIdx(i => i + 1);
    };

    return (
      <div className="absolute inset-0 flex flex-col px-5 pt-[64px] pb-24" style={{background:"var(--bg)"}}>
        <StatusBar/>
        <div className="flex items-center justify-between mb-3">
          <button onClick={onClose} className="stamp" style={{color:"var(--ink-mute)"}}>Close</button>
          <div className="stamp" style={{color:"var(--ink-mute)"}}>{event.title}</div>
        </div>

        {target ? (
          <div className="flex gap-3 mb-4 text-[12px]">
            <div className="flex-1 px-3 py-2 rounded-[12px]" style={{background:"var(--bg-elev)"}}>
              Girls <span className="font-mono" style={{color:"var(--ice)"}}>{t.girls}</span> / {target.girls}
            </div>
            <div className="flex-1 px-3 py-2 rounded-[12px]" style={{background:"var(--bg-elev)"}}>
              Guys <span className="font-mono" style={{color:"var(--ice)"}}>{t.guys}</span> / {target.guys}
            </div>
          </div>
        ) : (
          <div className="mb-4 text-[12px] px-3 py-2 rounded-[12px]" style={{background:"var(--bg-elev)"}}>
            Picked <span className="font-mono" style={{color:"var(--ice)"}}>{picked.length}</span> / {event.seats}
          </div>
        )}

        {done ? (
          <div className="flex-1 flex flex-col items-center justify-center text-center gap-3">
            <div className="font-black font-display-l text-[30px]">All reviewed</div>
            <div className="text-[13px]" style={{color:"var(--ink-2)"}}>You picked {picked.length}.</div>
            <div className="w-full mt-4 space-y-2 overflow-y-auto">
              {pool.filter(x=>picked.includes(x.id)).map(x => (
                <div key={x.id} className="flex items-center gap-3 px-3 py-2 rounded-[12px]" style={{background:"var(--bg-elev)"}}>
                  <FramedImage value={{src:x.photo,scale:1,x:0,y:0}} ratio="1/1" className="w-10 h-10"/>
                  <div className="flex-1 text-left text-[14px]">{x.name}</div>
                  <div className="font-mono text-[13px]" style={{color:"var(--ice)"}}>{quality10(x.quality_score)}</div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <>
            <div className="flex-1 flex items-center"><SwipeCard a={a}/></div>
            <div className="flex items-center justify-center gap-8 mt-5">
              <button onClick={()=>decide(false)} className="press w-16 h-16 rounded-full flex items-center justify-center"
                      style={{border:"1px solid var(--line-2)"}}><Icon name="x" size={26}/></button>
              <button onClick={()=>decide(true)} className="press glow-primary w-16 h-16 rounded-full flex items-center justify-center"
                      style={{background:"var(--ice)", color:"var(--ice-ink)"}}><Icon name="check" size={26}/></button>
            </div>
          </>
        )}
      </div>
    );
  }

  /* ========== ScreenPostEvent — 4-step post wizard ========== */
  function ScreenPostEvent({ venue, onPublish, onCancel }){
    const [sub, setSub] = useState("basics"); // basics | seats | image | review
    const [draft, setDraft] = useState(makeEvent({ venueId: venue.id, heroImage: venue.heroImage }));
    const set = (patch) => setDraft(d => ({ ...d, ...patch }));

    if (sub === "basics") {
      const ok = draft.title.length>=2 && draft.date && draft.time;
      return (
        <div className="absolute inset-0 flex flex-col px-5 pt-[64px] pb-24" style={{background:"var(--bg)"}}>

          <button onClick={onCancel} className="stamp text-left mb-2" style={{color:"var(--ink-mute)"}}>Cancel</button>
          <div className="font-black font-display-l text-[40px]">Post</div>
          <StepCircles current={1}/>
          <div className="text-[13px] mt-2" style={{color:"var(--ink-2)"}}>The basics</div>
          <div className="mt-6 space-y-5 flex-1 overflow-y-auto">
            <div>
              <div className="stamp mb-2">Title</div>
              <input
                value={draft.title}
                onChange={e => set({title:e.target.value})}
                type="text"
                placeholder="e.g. Pool Day"
                className="w-full h-12 px-3 rounded-[12px] text-[15px]"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>
            <div>
              <div className="stamp mb-2">Type</div>
              <div className="flex flex-wrap gap-2">
                {VENUE_TYPES.map(t => {
                  const sel = draft.type === t;
                  return (
                    <button
                      key={t}
                      onClick={() => set({type:t})}
                      className="press px-4 h-9 rounded-full text-[12px] font-medium"
                      style={{
                        background: sel ? "var(--ice)" : "transparent",
                        color: sel ? "var(--ice-ink)" : "var(--ink)",
                        border: sel ? "none" : "1px solid var(--line-2)"
                      }}
                    >{t}</button>
                  );
                })}
              </div>
            </div>
            <div>
              <div className="stamp mb-2">Date</div>
              <input
                value={draft.date}
                onChange={e => set({date:e.target.value})}
                type="text"
                placeholder="Sun · 25 May"
                className="w-full h-12 px-3 rounded-[12px] text-[15px]"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>
            <div>
              <div className="stamp mb-2">Time</div>
              <input
                value={draft.time}
                onChange={e => set({time:e.target.value})}
                type="text"
                placeholder="22:00"
                className="w-full h-12 px-3 rounded-[12px] text-[15px]"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>
          </div>
          <button disabled={!ok} onClick={()=>setSub("seats")}
            className="press w-full h-[58px] rounded-full text-[14px] font-semibold"
            style={{background: ok?"var(--ice)":"var(--bg-elev2)", color: ok?"var(--ice-ink)":"var(--ink-mute)"}}>Next</button>
        </div>
      );
    }
    if (sub === "seats") {
      const noPref = draft.mix === null;
      const total = noPref ? draft.seats : (draft.mix.girls + draft.mix.guys);
      const Stepper = ({label, val, onDelta}) => (
        <div className="flex items-center justify-between py-3">
          <div className="text-[15px]">{label}</div>
          <div className="flex items-center gap-4">
            <button onClick={()=>onDelta(-1)} className="press w-9 h-9 rounded-full" style={{border:"1px solid var(--line-2)"}}>–</button>
            <div className="font-mono text-[20px] w-8 text-center" style={{color:"var(--ice)"}}>{val}</div>
            <button onClick={()=>onDelta(1)} className="press w-9 h-9 rounded-full" style={{border:"1px solid var(--line-2)"}}>+</button>
          </div>
        </div>
      );
      return (
        <div className="absolute inset-0 flex flex-col px-5 pt-[64px] pb-24" style={{background:"var(--bg)"}}>
          <StatusBar/>
          <button onClick={()=>setSub("basics")} className="stamp text-left mb-2" style={{color:"var(--ink-mute)"}}>Back</button>
          <div className="font-black font-display-l text-[40px]">Seats</div>
          <StepCircles current={2}/>
          <div className="text-[13px] mt-2" style={{color:"var(--ink-2)"}}>Who fills the room</div>

          <div className="flex items-center justify-between mt-6 py-3 border-b" style={{borderColor:"var(--line)"}}>
            <div className="text-[15px]">Set a gender mix</div>
            <button onClick={()=> set({ mix: noPref ? {girls:15,guys:5} : null }) }
              className="press px-3 h-8 rounded-full text-[11px] font-medium"
              style={{background: noPref?"transparent":"var(--ice)", color: noPref?"var(--ink)":"var(--ice-ink)",
                      border: noPref?"1px solid var(--line-2)":"none"}}>{noPref?"Off":"On"}</button>
          </div>

          {noPref ? (
            <Stepper label="Total seats" val={draft.seats} onDelta={d=> set({ seats: Math.max(1, draft.seats+d) })}/>
          ) : (
            <>
              <Stepper label="Girls" val={draft.mix.girls} onDelta={d=> set({ mix: {...draft.mix, girls: Math.max(0, draft.mix.girls+d)} })}/>
              <Stepper label="Guys"  val={draft.mix.guys}  onDelta={d=> set({ mix: {...draft.mix, guys:  Math.max(0, draft.mix.guys+d)} })}/>
            </>
          )}

          <div className="mt-4 stamp" style={{color:"var(--ink-mute)"}}>{total} seats total</div>
          <div className="flex-1"/>
          <button disabled={total<1} onClick={()=> { set({ seats: total }); setSub("image"); }}
            className="press w-full h-[58px] rounded-full text-[14px] font-semibold"
            style={{background: total>=1?"var(--ice)":"var(--bg-elev2)", color: total>=1?"var(--ice-ink)":"var(--ink-mute)"}}>Next</button>
        </div>
      );
    }
    if (sub === "image") {
      return (
        <div className="absolute inset-0 flex flex-col px-5 pt-[64px] pb-24" style={{background:"var(--bg)"}}>
          <StatusBar/>
          <button onClick={()=>setSub("seats")} className="stamp text-left mb-2" style={{color:"var(--ink-mute)"}}>Back</button>
          <div className="font-black font-display-l text-[40px]">Image</div>
          <StepCircles current={3}/>
          <div className="text-[13px] mt-2" style={{color:"var(--ink-2)"}}>The event photo</div>
          <div className="text-[12px] mt-3" style={{color:"var(--ink-mute)"}}>Reuse your venue hero, or choose a new one.</div>
          <div className="mt-5 flex-1 overflow-y-auto">
            <ImageCropper
              ratio="4/5"
              value={draft.heroImage}
              label="Event photo"
              onChange={(v)=>{ set({heroImage:v}); setSub("review"); }}
              onCancel={()=>setSub("seats")}
            />
          </div>
        </div>
      );
    }
    // sub === "review"
    return (
      <div className="absolute inset-0 flex flex-col px-5 pt-[64px] pb-24" style={{background:"var(--bg)"}}>
        <StatusBar/>
        <button onClick={()=>setSub("image")} className="stamp text-left mb-2" style={{color:"var(--ink-mute)"}}>Back</button>
        <div className="font-black font-display-l text-[40px]">Review</div>
        <StepCircles current={4}/>
        <div className="mt-5 flex-1 overflow-y-auto space-y-4">
          <FramedImage value={draft.heroImage} ratio="4/5" className="w-full"/>
          <div>
            <div className="font-black text-[24px] leading-tight">{draft.title}</div>
            <div className="text-[13px] mt-1" style={{color:"var(--ink-mute)"}}>{draft.type} · {draft.date} · {draft.time}</div>
          </div>
          <div className="text-[13px]" style={{color:"var(--ink-mute)"}}>
            {draft.mix
              ? "Girls " + draft.mix.girls + " · Guys " + draft.mix.guys + " · " + draft.seats + " seats"
              : draft.seats + " seats · no gender preference"}
          </div>
          <div>
            <div className="stamp mb-1">The exchange</div>
            <div className="text-[14px]">{draft.exchange}</div>
          </div>
        </div>
        <button onClick={()=>onPublish(draft)}
          className="press w-full h-[58px] rounded-full text-[14px] font-semibold flex items-center justify-center gap-2"
          style={{background:"var(--ice)", color:"var(--ice-ink)"}}>Publish <Icon name="arrow-right" size={16} stroke={1.8}/></button>
      </div>
    );
  }

  /* ========== APP — onboarding state machine ========== */
  function App(){
    const [step, setStep] = useState("intro");
    // intro | login | onboard-group | onboard-venue | done
    const [light, setLight] = useState(false);
    const [group, setGroup] = useState(null);          // {id,name,logo} | null (independent)
    const [venue, setVenue] = useState(makeVenue());   // venue being registered
    const [events, setEvents] = useState(SEED_EVENTS); // their drops
    const [tab, setTab] = useState("desk");            // desk | events | door | venue
    const [pickedIds, setPickedIds] = useState([]);    // swipe picks — shared with the desk tiles
    const [toast, setToast] = useState(null);
    const toastTimer = useRef(null);

    useEffect(() => { document.documentElement.classList.toggle('light', light); }, [light]);
    const [reviewEvent, setReviewEvent] = useState(null);
    const showToast = (msg) => { setToast(msg); if (toastTimer.current) clearTimeout(toastTimer.current); toastTimer.current = setTimeout(()=>setToast(null), 2200); };

    // wrap: page chrome (theme toggle + explanatory card + phone frame + Toast), like index.html's App return
    const wrap = (node) => (
      <div className="min-h-screen w-full flex flex-col items-center pt-20 pb-24">
        <a className="side-link" href="./">← Influencer side</a>
        <button className="theme-toggle" onClick={() => setLight(l => !l)}><span className="dot"></span>{light ? 'Light' : 'Dark'} · switch</button>
        <div className="mb-8 text-center">
          <div className="font-display text-[14px]" style={{color:"var(--ink-mute)"}}>The List · Venue side · Prototype v0.1</div>
          <div className="font-black text-[28px] leading-none mt-2">Venue flow</div>
        </div>
        <div className="iphone"><div className="iphone-screen">
          {node}
          <Toast msg={toast}/>
        </div></div>
      </div>
    );

    if (step === "intro") return wrap(<ScreenVenueIntro onList={()=>setStep("login")} onLogin={()=>setStep("login")}
      onDemo={()=>{ setVenue(DEMO_VENUE); setGroup(null); setStep("done"); setTab("desk"); }}/>);
    if (step === "login") return wrap(<ScreenVenueLogin onDone={()=>setStep("onboard-group")}/>);
    if (step === "onboard-group") return wrap(<ScreenOnboardGroup group={group} setGroup={setGroup} onNext={()=>setStep("onboard-venue")}/>);
    if (step === "onboard-venue") return wrap(<ScreenOnboardVenue venue={venue} setVenue={setVenue} group={group} onDone={()=>{ setStep("done"); setTab("desk"); }}/>);

    const openReview = (e) => { setReviewEvent(e); setStep("review-deck"); };
    const openEvent = (e) => { e.status === "live" ? openReview(e) : showToast("Draft — editing coming soon"); };
    const publishEvent = (draft) => {
      setEvents(es => [{ ...draft, status: "live" }, ...es]);
      setStep("done"); setTab("events");
      showToast("Event published");
    };
    if (step === "post") return wrap(<ScreenPostEvent venue={venue} onCancel={()=>setStep("done")} onPublish={publishEvent}/>);
    if (step === "done") return wrap(
      <>
        {tab === "desk"   && <ScreenDesk venue={venue} events={events} pool={APPLICANTS} pickedIds={pickedIds} onReview={openReview} onPost={()=>setStep("post")}/>}
        {tab === "events" && <ScreenEvents events={events} venue={venue} onPost={()=>setStep("post")} onOpenEvent={openEvent}/>}
        {tab === "door"   && <ScreenDoor pool={APPLICANTS} onToast={showToast}/>}
        {tab === "venue"  && <ScreenVenueProfile venue={venue} group={group} onEdit={()=>setStep("onboard-venue")} onLogout={()=>setStep("intro")} onToast={showToast}/>}
        <VenueTabBar tab={tab} onTab={setTab}/>
      </>
    );

    if (step === "review-deck") return wrap(<ScreenReview event={reviewEvent} pool={APPLICANTS} picked={pickedIds} setPicked={setPickedIds} onClose={()=>{ setStep("done"); setTab("desk"); }}/>);

    // Generic fallback for steps not yet built.
    return wrap(
      <>
        <StatusBar/>
        <div className="absolute inset-0 flex items-center justify-center" style={{background:"var(--bg)"}}>
          <div className="font-black font-display-l text-[34px]" style={{color:"var(--ink-mute)"}}>{step}</div>
        </div>
        <HomeIndicator/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
