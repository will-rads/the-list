<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The List · By invitation only</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2/dist/umd/supabase.min.js" integrity="sha384-sgcvElP/LlNRtORGYFLO/9K/bENcpJK19HgvqslWXog6d8f/Va4TpltGiBlGntCM" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100svh; color: #f5f1ea; background: #000 url('../assets/bg-3.jpeg') center/cover fixed; font-family: 'Plus Jakarta Sans', sans-serif; }
  body::before { content: ''; position: fixed; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.42), #000 92%), radial-gradient(circle at 70% 20%, transparent, rgba(0,0,0,.58)); }
  main { position: relative; z-index: 1; min-height: 100svh; display: grid; grid-template-rows: auto 1fr; padding: 28px clamp(20px, 5vw, 64px) 36px; }
  .wordmark { font-size: 15px; font-weight: 800; letter-spacing: .34em; }
  .event { align-self: end; width: min(100%, 620px); }
  .image { display: none; width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 24px; margin-bottom: 28px; box-shadow: 0 26px 80px rgba(0,0,0,.42); }
  .meta { margin: 0 0 10px; font-size: 13px; line-height: 1.6; }
  h1 { margin: 0 0 18px; max-width: 12ch; font-size: clamp(42px, 10vw, 76px); font-weight: 800; line-height: .94; letter-spacing: -.045em; }
  .rope { margin: 0 0 22px; font-size: 17px; }
  .cta { display: inline-flex; min-height: 56px; align-items: center; justify-content: center; padding: 0 26px; border-radius: 999px; color: #0a0a0a; background: #f5f1ea; font-weight: 800; text-decoration: none; }
  .cta:focus-visible { outline: 3px solid #f5f1ea; outline-offset: 4px; }
  @media (min-width: 760px) { main { grid-template-rows: auto 1fr; } .event { display: grid; grid-template-columns: minmax(260px, .82fr) 1fr; gap: 44px; align-items: end; width: min(100%, 1040px); } .image { margin: 0; } .copy { grid-column: 1 / -1; } .image[style*="block"] + .copy { grid-column: auto; } }
</style>
</head>
<body>
<main>
  <div class="wordmark">THE LIST</div>
  <section class="event" aria-live="polite">
    <img class="image" id="event-image" alt="">
    <div class="copy">
      <p class="meta" id="meta" hidden></p>
      <h1 id="title" hidden></h1>
      <p class="rope">By invitation only</p>
      <a class="cta" href="/v3/">Apply for access</a>
    </div>
  </section>
</main>
<script>
const supabaseClient = window.supabase.createClient(
  "https://zrbakomzpuesifasuamb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyYmFrb216cHVlc2lmYXN1YW1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTYzNzIsImV4cCI6MjA5ODY5MjM3Mn0.3ntox_XSnie3EIEflgZb7hxbsC0CFlwF-M1J2wVfCGA"
);

(async () => {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) return;
  const { data } = await supabaseClient.from('events')
    .select('title,image_url,starts_at,kind,status,venues(name,area)')
    .eq('id', id).in('status', ['published', 'closed']).maybeSingle();
  if (!data) return;

  const venue = data.venues || {};
  const when = data.starts_at ? new Intl.DateTimeFormat('en-LB', { weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' }).format(new Date(data.starts_at)) : '';
  const meta = [venue.name, venue.area, when].filter(Boolean).join(' · ');
  document.title = `${data.title} · The List`;
  document.querySelector('#title').textContent = data.title;
  document.querySelector('#title').hidden = false;
  document.querySelector('#meta').textContent = meta;
  document.querySelector('#meta').hidden = !meta;
  if (data.image_url) {
    const image = document.querySelector('#event-image');
    image.src = data.image_url;
    image.alt = data.title;
    image.style.display = 'block';
  }
})().catch(() => {});
</script>
</body>
</html>
