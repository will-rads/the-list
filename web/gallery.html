<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The List — Influencer App</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:        #0B0A08;
    --bg-elev:   #14120E;
    --bg-elev2:  #1C1A14;
    --ink:       #F2EDE2;
    --ink-2:     #C9C2B2;
    --ink-mute:  #7F786A;
    --line:      rgba(242,237,226,0.10);
    --line-2:    rgba(242,237,226,0.18);
    --acid:      #D9F25E;
    --acid-ink:  #0B0A08;
    --blood:     #B73247;
    --plum:      #4A1E27;
    --page:      #050402;
  }
  /* Light mode — bone paper, ink-dark, acid stays for the burn */
  html.light{
    --bg:        #F5F1E6;
    --bg-elev:   #FFFFFF;
    --bg-elev2:  #ECE7D9;
    --ink:       #0B0A08;
    --ink-2:     #3A352C;
    --ink-mute:  #8A8273;
    --line:      rgba(11,10,8,0.10);
    --line-2:    rgba(11,10,8,0.18);
    --acid:      #B8D437;
    --acid-ink:  #0B0A08;
    --blood:     #9A2638;
    --plum:      #3A1620;
    --page:      #EFEADD;
  }
  html, body { background: var(--page); color: var(--ink); font-family: 'Geist', ui-sans-serif, system-ui; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .ital { font-style: italic; }

  /* Hide scrollbars inside phone screens */
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width: none; }

  /* iPhone bezel */
  .iphone {
    width: 393px; height: 852px;
    border-radius: 54px;
    padding: 11px;
    background: linear-gradient(140deg,#2a2722 0%, #0c0a08 45%, #1d1a16 100%);
    box-shadow:
      inset 0 0 0 1.5px #3a3631,
      inset 0 0 0 3px #0a0807,
      0 60px 80px -40px rgba(0,0,0,.9),
      0 30px 60px -30px rgba(0,0,0,.6);
    position: relative;
  }
  .iphone::before {
    content:""; position:absolute; inset:11px; border-radius:43px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    pointer-events:none;
  }
  .iphone-screen {
    width: 100%; height: 100%; border-radius: 43px;
    overflow: hidden; position: relative; background: var(--bg);
    isolation: isolate;
  }
  /* Dynamic island */
  .island { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#000; border-radius:20px; z-index:50; }
  .island::after { content:""; position:absolute; right:10px; top:50%; transform:translateY(-50%); width:8px; height:8px; border-radius:50%; background:#0a0a0a; box-shadow: inset 0 0 2px rgba(255,255,255,.2); }

  /* status bar */
  .statusbar { position:absolute; top:0; left:0; right:0; height:54px; padding: 16px 28px 0; display:flex; justify-content:space-between; align-items:flex-start; z-index:40; font-family:'Geist'; font-weight:600; font-size:15px; letter-spacing:-0.01em; color: var(--ink); pointer-events:none; }
  .statusbar svg { width: 16px; height: 11px; }

  /* tab bar */
  .tabbar { position:absolute; left:0; right:0; bottom:0; height: 88px; padding: 10px 18px 30px; display:grid; grid-template-columns:repeat(4,1fr); gap: 4px; background: linear-gradient(180deg, rgba(11,10,8,0) 0%, rgba(11,10,8,.85) 35%, rgba(11,10,8,.95) 100%); backdrop-filter: blur(18px); z-index: 30; border-top: 1px solid var(--line); }
  html.light .tabbar { background: linear-gradient(180deg, rgba(245,241,230,0) 0%, rgba(245,241,230,.92) 35%, rgba(245,241,230,1) 100%); }
  .tabbar button { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color: var(--ink-mute); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 0; border-radius: 14px; transition: color .15s; }
  .tabbar button.active { color: var(--ink); }
  .tabbar button.active .dot { background: var(--acid); }
  .tabbar .dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }

  /* hairline rule */
  .hr { height: 1px; background: var(--line); }
  .hr-2 { height: 1px; background: var(--line-2); }

  /* Editorial number stamps */
  .stamp { font-family:'JetBrains Mono'; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); }

  /* Acid chip / pill */
  .chip-acid { background: var(--acid); color: var(--acid-ink); }
  .chip-blood { background: var(--blood); color: var(--ink); }
  .chip-outline { border: 1px solid var(--line-2); color: var(--ink); }

  /* Pressable */
  .press { transition: transform .12s ease, opacity .12s ease, background .2s, border-color .2s; }
  .press:active { transform: scale(.97); opacity: .85; }

  /* Editorial split caps */
  .smallcaps { text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; font-weight: 500; }

  /* Marquee */
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee { animation: marquee 22s linear infinite; }

  /* Confirm pulse */
  @keyframes pulseRing {
    0% { box-shadow: 0 0 0 0 rgba(217,242,94,.55); }
    100% { box-shadow: 0 0 0 32px rgba(217,242,94,0); }
  }
  .pulse-ring { animation: pulseRing 1.8s cubic-bezier(.4,.2,.2,1) infinite; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Countdown */
  .countdown-digit {
    font-family:'Instrument Serif';
    font-feature-settings: "tnum";
  }

  /* Page chrome */
  .page-bg {
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(217,242,94,.04), transparent 60%),
      radial-gradient(1200px 800px at 100% 100%, rgba(183,50,71,.05), transparent 60%),
      var(--page);
  }
  html.light .page-bg {
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(184,212,55,.10), transparent 60%),
      radial-gradient(1200px 800px at 100% 100%, rgba(154,38,56,.06), transparent 60%),
      var(--page);
  }
  /* Lift density just slightly — the magazine wants air */
  .iphone-screen { letter-spacing: -0.005em; }
  .iphone-screen .px-5 { padding-left: 1.5rem; padding-right: 1.5rem; }
  .iphone-screen section + section,
  .iphone-screen .py-4 { padding-top: 1.25rem; padding-bottom: 1.25rem; }
  /* Theme toggle pill */
  .theme-toggle {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display:flex; align-items:center; gap:8px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--line-2);
    color: var(--ink); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .theme-toggle:hover { border-color: var(--acid); color: var(--acid); }
  .theme-toggle .dot { width:6px; height:6px; border-radius:50%; background: var(--acid); }

  /* Image placeholder with subtle film grain */
  .grain::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: overlay;
    pointer-events: none;
  }

  /* Tiny vertical text */
  .vt { writing-mode: vertical-rl; transform: rotate(180deg); }

  /* swipe-applicants stack offset */
  .stack-card { transition: transform .35s cubic-bezier(.2,.7,.2,1), opacity .25s; }
</style>
</head>
<body class="page-bg min-h-screen">

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- Real imagery (curated stable Unsplash IDs) ---------- */
const IMG = {
  // venues
  beachClub:   "https://images.unsplash.com/photo-1505761671935-60b3a7427bad?w=900&q=80&auto=format&fit=crop",
  pool:        "https://images.unsplash.com/photo-1540541338287-41700207dee6?w=900&q=80&auto=format&fit=crop",
  rooftop:     "https://images.unsplash.com/photo-1551918120-9739cb430c6d?w=900&q=80&auto=format&fit=crop",
  restaurant:  "https://images.unsplash.com/photo-1592861956120-e524fc739696?w=900&q=80&auto=format&fit=crop",
  club:        "https://images.unsplash.com/photo-1545128485-c400e7702796?w=900&q=80&auto=format&fit=crop",
  clubRed:     "https://images.unsplash.com/photo-1566737236500-c8ac43014a67?w=900&q=80&auto=format&fit=crop",
  gym:         "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=900&q=80&auto=format&fit=crop",
  lounge:      "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&q=80&auto=format&fit=crop",
  dj:          "https://images.unsplash.com/photo-1545128485-c400e7702796?w=900&q=80&auto=format&fit=crop",
  neon:        "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1200&q=80&auto=format&fit=crop",
  cocktail:    "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=900&q=80&auto=format&fit=crop",
  beirut:      "https://images.unsplash.com/photo-1620553967747-50fdadc4b606?w=1200&q=80&auto=format&fit=crop",
  // people
  sara:        "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600&q=80&auto=format&fit=crop",
  saraFull:    "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=900&q=80&auto=format&fit=crop",
  p1:          "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&q=80&auto=format&fit=crop",
  p2:          "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&q=80&auto=format&fit=crop",
  p3:          "https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=400&q=80&auto=format&fit=crop",
  p4:          "https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?w=400&q=80&auto=format&fit=crop",
  p5:          "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400&q=80&auto=format&fit=crop",
  p6:          "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400&q=80&auto=format&fit=crop",
  p7:          "https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?w=400&q=80&auto=format&fit=crop",
};

/* ---------- UI atoms ---------- */
function Icon({ name, size=18, stroke=1.5, className="" }) {
  const ref = useRef(null);
  useEffect(()=>{
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", name);
      el.setAttribute("stroke-width", stroke);
      el.style.width = size+"px";
      el.style.height = size+"px";
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { "stroke-width": stroke, width: size, height: size } });
    }
  }, [name, size, stroke]);
  return <span ref={ref} className={"inline-flex "+className} style={{lineHeight:0}} />;
}

function StatusBar({ light=true }) {
  return (
    <div className="statusbar" style={{color: light ? "var(--ink)" : "#000"}}>
      <span>9:41</span>
      <div className="flex items-center gap-1.5">
        {/* signal */}
        <svg viewBox="0 0 18 12" fill="none">
          <rect x="0" y="8" width="3" height="4" rx=".5" fill="currentColor"/>
          <rect x="5" y="5" width="3" height="7" rx=".5" fill="currentColor"/>
          <rect x="10" y="2" width="3" height="10" rx=".5" fill="currentColor"/>
          <rect x="15" y="0" width="3" height="12" rx=".5" fill="currentColor" opacity=".4"/>
        </svg>
        {/* wifi */}
        <svg viewBox="0 0 16 12" fill="none" className="w-4 h-3">
          <path d="M1 4.5A11 11 0 0 1 15 4.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          <path d="M3.5 7A7.5 7.5 0 0 1 12.5 7" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          <path d="M6 9.4A3.2 3.2 0 0 1 10 9.4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          <circle cx="8" cy="11" r="0.9" fill="currentColor"/>
        </svg>
        {/* battery */}
        <svg viewBox="0 0 26 12" className="w-7 h-3">
          <rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="currentColor" fill="none"/>
          <rect x="2" y="2" width="19" height="8" rx="1.5" fill="currentColor"/>
          <rect x="23" y="4" width="2" height="4" rx="1" fill="currentColor"/>
        </svg>
      </div>
    </div>
  );
}

function HomeIndicator({ light=true }) {
  return (
    <div className="absolute left-0 right-0 bottom-2 flex justify-center z-50 pointer-events-none">
      <div className="w-32 h-1 rounded-full" style={{background: light ? "rgba(242,237,226,.85)":"rgba(0,0,0,.55)"}}/>
    </div>
  );
}

function TabBar({ active, onChange }) {
  const tabs = [
    { id:"home", label:"Tonight", icon:"sparkle" },
    { id:"explore", label:"Index", icon:"layout-grid" },
    { id:"events", label:"My List", icon:"bookmark" },
    { id:"profile", label:"Me", icon:"user" },
  ];
  return (
    <div className="tabbar">
      {tabs.map(t=>(
        <button key={t.id} className={"press "+(active===t.id?"active":"")} onClick={()=>onChange(t.id)}>
          <Icon name={t.icon} size={20} stroke={1.4}/>
          <span>{t.label}</span>
          <span className="dot"/>
        </button>
      ))}
    </div>
  );
}

/* ---------- Screen frame ---------- */
function PhoneFrame({ idx, label, sub, children, screenLabel }) {
  return (
    <div className="flex flex-col items-start" data-screen-label={screenLabel}>
      <div className="flex items-baseline gap-4 mb-5 px-1" style={{width:393}}>
        <span className="stamp" style={{color:"var(--acid)"}}>{String(idx).padStart(2,"0")}</span>
        <div className="flex-1">
          <div className="font-display text-[28px] leading-none">{label}</div>
          <div className="text-[11px] mt-1.5" style={{color:"var(--ink-mute)", letterSpacing:".06em"}}>{sub}</div>
        </div>
      </div>
      <div className="iphone">
        <div className="iphone-screen">
          <div className="island" />
          {children}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   01 — HOME / TONIGHT
   ============================================================ */
function ScreenHome({ goEvent, onTab, tab }) {
  return (
    <div className="absolute inset-0 noscroll overflow-y-auto" style={{background:"var(--bg)"}}>
      <StatusBar/>
      {/* Top hero */}
      <div className="relative h-[440px]">
        <img src={IMG.club} alt="" className="absolute inset-0 w-full h-full object-cover" style={{filter:"contrast(1.05) saturate(.85)"}}/>
        <div className="absolute inset-0" style={{background:"linear-gradient(180deg, rgba(11,10,8,.55) 0%, rgba(11,10,8,0) 30%, rgba(11,10,8,.2) 60%, rgba(11,10,8,.95) 100%)"}}/>
        <div className="absolute inset-0 grain" />

        {/* top row */}
        <div className="absolute top-[60px] left-5 right-5 flex items-center justify-between z-10">
          <div className="flex items-center gap-2.5">
            <img src={IMG.sara} alt="" className="w-9 h-9 rounded-full object-cover ring-1 ring-white/30"/>
            <div>
              <div className="text-[10px] uppercase tracking-[.22em]" style={{color:"var(--ink-2)"}}>Beirut</div>
              <div className="text-[13px] font-medium">Saturday · 16:04</div>
            </div>
          </div>
          <button className="press w-9 h-9 rounded-full border border-white/20 flex items-center justify-center backdrop-blur-md" style={{background:"rgba(11,10,8,.35)"}}>
            <Icon name="bell" size={16} stroke={1.4}/>
            <span className="absolute w-1.5 h-1.5 rounded-full" style={{background:"var(--acid)", marginLeft:18, marginTop:-12}}/>
          </button>
        </div>

        {/* Editorial title */}
        <div className="absolute bottom-6 left-5 right-5 z-10">
          <div className="smallcaps mb-3" style={{color:"var(--acid)"}}>The List · No. 048</div>
          <div className="font-display text-[56px] leading-[0.92] tracking-tight">Tonight,<br/><span className="ital">by invitation.</span></div>
          <div className="text-[12px] mt-3 max-w-[280px]" style={{color:"var(--ink-2)"}}>Twelve rooms across Beirut are open. Apply before the doors close.</div>
        </div>
      </div>

      {/* Featured strip */}
      <div className="px-5 pt-7 pb-3 flex items-end justify-between">
        <div>
          <div className="smallcaps" style={{color:"var(--ink-mute)"}}>Featured · Tonight</div>
          <div className="font-display text-[26px] leading-none mt-1">Rooms open now</div>
        </div>
        <span className="stamp">04 / 12</span>
      </div>

      {/* Hero card */}
      <button className="press block w-full px-5 pb-4 text-left" onClick={goEvent}>
        <div className="relative rounded-[20px] overflow-hidden grain" style={{height:280, background:"var(--bg-elev)"}}>
          <img src={IMG.pool} alt="" className="absolute inset-0 w-full h-full object-cover"/>
          <div className="absolute inset-0" style={{background:"linear-gradient(180deg, rgba(11,10,8,.1) 50%, rgba(11,10,8,.95) 100%)"}}/>
          {/* Live dot */}
          <div className="absolute top-4 left-4 flex items-center gap-2 px-2.5 py-1 rounded-full" style={{background:"rgba(11,10,8,.55)", backdropFilter:"blur(8px)"}}>
            <span className="w-1.5 h-1.5 rounded-full" style={{background:"var(--acid)", boxShadow:"0 0 8px var(--acid)"}}/>
            <span className="text-[10px] uppercase tracking-[.22em]">Open · 04h left</span>
          </div>
          {/* Bookmark */}
          <span role="button" className="absolute top-4 right-4 w-9 h-9 rounded-full border border-white/25 flex items-center justify-center" style={{background:"rgba(11,10,8,.35)", backdropFilter:"blur(8px)"}}>
            <Icon name="bookmark" size={15} stroke={1.4}/>
          </span>
          {/* Bottom info */}
          <div className="absolute bottom-0 left-0 right-0 p-4">
            <div className="flex items-end justify-between gap-3">
              <div>
                <div className="font-display text-[32px] leading-[0.95]">Pool Day</div>
                <div className="text-[13px] mt-1" style={{color:"var(--ink-2)"}}>Cyan Beach Club · Jiyeh</div>
              </div>
              <div className="text-right">
                <div className="stamp" style={{color:"var(--ink-2)"}}>Sun · 14:00</div>
                <div className="text-[13px] mt-0.5"><span className="font-display text-[20px]" style={{color:"var(--acid)"}}>20</span> seats</div>
              </div>
            </div>
            {/* Applicant progress */}
            <div className="mt-4">
              <div className="h-[2px] rounded-full" style={{background:"rgba(242,237,226,.15)"}}>
                <div className="h-full rounded-full" style={{width:"68%", background:"var(--acid)"}}/>
              </div>
              <div className="flex justify-between mt-1.5">
                <span className="stamp">137 applied</span>
                <span className="stamp">Closes 21:00</span>
              </div>
            </div>
          </div>
        </div>
      </button>

      {/* Filter row */}
      <div className="px-5 pt-3 pb-1">
        <div className="flex gap-2 overflow-x-auto noscroll">
          {["All","Clubs","Restaurants","Beach","Gym","Rooftop","Private"].map((f,i)=>(
            <button key={f} className={"press flex-shrink-0 px-3.5 h-8 rounded-full text-[12px] "+(i===0?"":"")} style={i===0?{background:"var(--ink)", color:"var(--bg)"}:{border:"1px solid var(--line-2)", color:"var(--ink-2)"}}>{f}</button>
          ))}
        </div>
      </div>

      {/* Index list — mini cards */}
      <div className="px-5 pt-5 pb-2 flex items-end justify-between">
        <div className="font-display text-[22px] leading-none">Also tonight</div>
        <span className="stamp">11 more</span>
      </div>
      {[
        {title:"Pyrite", venue:"Mar Mikhael · Club", time:"23:00", remain:8, total:30, img:IMG.clubRed, tag:"DJ Cosmo"},
        {title:"Tasting Menu", venue:"Em Sherif · Achrafieh", time:"20:30", remain:3, total:12, img:IMG.restaurant, tag:"Chef"},
        {title:"Rooftop Sundown", venue:"Le Gray · DT Beirut", time:"19:00", remain:14, total:25, img:IMG.rooftop, tag:"Acoustic"},
      ].map((e,i)=>(
        <button key={i} className="press w-full px-5 py-3 flex items-center gap-4 text-left border-t" style={{borderColor:"var(--line)"}}>

function ScreenPicked({ onConfirm, onLater }) {

      setS(prev => {
        if (prev>0) return prev-1;
        setM(mm => {
          if (mm>0) return mm-1;
          setH(hh=>Math.max(hh-1,0));
          return 59;
        });
        return 59;
      });
    }, 1000);
    return ()=>clearInterval(t);
  }, []);
  return (
    <div className="absolute inset-0 noscroll" style={{background:"var(--bg)"}}>

          {[

            {v:String(m).padStart(2,"0"), l:"min"},
            {v:":", l:""},
            {v:String(s).padStart(2,"0"), l:"sec"},
