<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The List - Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<style>
  :root{
    --bg:        #0A0A0A;
    --bg-elev:   #141414;
    --bg-elev2:  #1C1C1C;
    --ink:       #F5F1EA;
    --ink-2:     #C5C0B5;
    --ink-mute:  #8A8A8A;
    --line:      rgba(245,241,234,0.10);
    --line-2:    rgba(245,241,234,0.18);
    --ice:       #9FD8E8;
    --ice-dim:   #6FB5C9;
    --ice-ink:   #0A0A0A;
    --page:      #050505;
  }
  html.light{
    --bg:        #FFFFFF;
    --bg-elev:   #F5F5F5;
    --bg-elev2:  #EAEAEA;
    --ink:       #0A0A0A;
    --ink-2:     #3A3A3A;
    --ink-mute:  #7A7A7A;
    --line:      rgba(10,10,10,0.08);
    --line-2:    rgba(10,10,10,0.14);
    --ice:       #4FA8C5;
    --ice-ink:   #FFFFFF;
    --page:      #FAFAFA;
  }
  html, body {
    background: var(--page);
    color: var(--ink);
    font-family: 'Host Grotesk', ui-sans-serif, system-ui;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }
  /* Satoshi only on big headlines + medium-weight labels that need extra presence.
     Everything else inherits Host Grotesk. */
  .font-black,
  .font-display {
    font-family: 'Satoshi', ui-sans-serif, system-ui;
    font-weight: 900;
    letter-spacing: -0.015em;
  }
  .font-display-l {
    font-family: 'Satoshi', ui-sans-serif, system-ui;
    font-weight: 900;
    letter-spacing: -0.025em;
  }
  /* font-mono was used in JSX for numbers/timers; map it to Satoshi 900
     with tabular figures so digits feel thick and modern, and the third
     font is gone. */
  .font-mono {
    font-family: 'Satoshi', ui-sans-serif, system-ui;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }

  /* hide scrollbars inside phone screens */
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width: none; }

  /* iphone bezel */
  .iphone {
    width: 393px; height: 852px;
    border-radius: 54px;
    padding: 11px;
    background: linear-gradient(140deg,#2a2722 0%, #0c0a08 45%, #1d1a16 100%);
    box-shadow:
      inset 0 0 0 1.5px #3a3631,
      inset 0 0 0 3px #0a0807,
      0 60px 80px -40px rgba(0,0,0,.9),
      0 30px 60px -30px rgba(0,0,0,.6);
    position: relative;
  }
  .iphone-screen {
    width: 100%; height: 100%; border-radius: 43px;
    overflow: hidden; position: relative; background: var(--bg);
    isolation: isolate;
  }
  .island { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#000; border-radius:20px; z-index:50; }

  .statusbar { position:absolute; top:0; left:0; right:0; height:54px; padding: 16px 28px 0; display:flex; justify-content:space-between; align-items:flex-start; z-index:40; font-family:'Host Grotesk', sans-serif; font-weight:600; font-variant-numeric: tabular-nums; font-size:14px; color: var(--ink); pointer-events:none; }
  .statusbar svg { width: 16px; height: 11px; }

  .tabbar {
    position:absolute; left:0; right:0; bottom:0; height: 88px;
    padding: 12px 18px 30px;
    display:grid; grid-template-columns:repeat(4,1fr); gap: 4px;
    background: linear-gradient(180deg, transparent 0%, var(--bg) 50%, var(--bg) 100%);
    backdrop-filter: blur(18px);
    z-index: 30;
    border-top: 1px solid var(--line);
  }
  .tabbar button {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px; color: var(--ink-mute);
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 4px 0; border-radius: 14px;
    transition: color .15s;
    background: transparent; border: 0; cursor: pointer;
  }
  .tabbar button.active { color: var(--ink); }
  .tabbar button.active .dot { background: var(--ice); }
  .tabbar .dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }

  .hr { height: 1px; background: var(--line); }
  .hr-2 { height: 1px; background: var(--line-2); }

  .stamp { font-family:'Host Grotesk', sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); }
  .smallcaps { text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; font-weight: 500; }

  .chip-ice { background: var(--ice); color: var(--ice-ink); }
  .chip-outline { border: 1px solid var(--line-2); color: var(--ink); }

  .press { transition: transform .12s ease, opacity .12s ease, background .2s, border-color .2s; cursor: pointer; }
  .press:active { transform: scale(.97); opacity: .85; }

  .vt { writing-mode: vertical-rl; transform: rotate(180deg); }

  /* film grain */
  .grain::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: overlay;
    pointer-events: none;
  }

  .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(159,216,232,.04), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(159,216,232,.025), transparent 60%),
      var(--page);
  }
  html.light .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(111,181,201,.10), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(111,181,201,.05), transparent 60%),
      var(--page);
  }

  .theme-toggle {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display:flex; align-items:center; gap:8px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--line-2);
    color: var(--ink); font-family: 'Host Grotesk', sans-serif; font-weight: 500;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .theme-toggle:hover { border-color: var(--ice); color: var(--ice); }
  .theme-toggle .dot { width:6px; height:6px; border-radius:50%; background: var(--ice); }

  @keyframes pulseIce {
    0% { box-shadow: 0 0 0 0 rgba(159,216,232,.5); }
    100% { box-shadow: 0 0 0 28px rgba(159,216,232,0); }
  }
  .pulse-ice { animation: pulseIce 1.8s cubic-bezier(.4,.2,.2,1) infinite; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .anim-up { animation: slideUp .5s cubic-bezier(.2,.7,.2,1); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .anim-fade { animation: fadeIn .35s ease; }

  /* Stagger entrance for list children. Each child sets style={{"--i": index}}. */
  .stagger > * { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    @keyframes staggerUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .stagger > * {
      animation: staggerUp .45s ease-out both;
      animation-delay: calc(var(--i, 0) * 60ms);
    }
  }

  /* Picked screen — ring scale-in + content stagger */
  @keyframes ringPop {
    0%   { transform: scale(.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pickedFadeUp {
    from { transform: translateY(14px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .ring-pop { animation: ringPop .8s cubic-bezier(.2,.7,.2,1) backwards; }
  .picked-stagger { animation: pickedFadeUp .55s ease-out backwards; }

  /* Filter sheet — backdrop dim + sheet slide up */
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes dimIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .sheet-backdrop { animation: dimIn .25s ease; }
  .sheet { animation: sheetIn .35s cubic-bezier(.2,.7,.2,1); }

  /* Submit spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin .9s linear infinite; }
</style>
</head>
<body class="page-bg min-h-screen">
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

/* ========== curated imagery ========== */
const IMG = {
  beachClub:  "./assets/pool-day.png",
  pool:       "https://images.unsplash.com/photo-1540541338287-41700207dee6?w=900&q=80&auto=format&fit=crop",
  rooftop:    "https://images.unsplash.com/photo-1551918120-9739cb430c6d?w=900&q=80&auto=format&fit=crop",
  restaurant: "https://images.unsplash.com/photo-1592861956120-e524fc739696?w=900&q=80&auto=format&fit=crop",
  club:       "https://images.unsplash.com/photo-1545128485-c400e7702796?w=900&q=80&auto=format&fit=crop",
  clubRed:    "https://images.unsplash.com/photo-1566737236500-c8ac43014a67?w=900&q=80&auto=format&fit=crop",
  gym:        "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=900&q=80&auto=format&fit=crop",
  lounge:     "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&q=80&auto=format&fit=crop",
  cocktail:   "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=900&q=80&auto=format&fit=crop",
  beirut:     "https://images.unsplash.com/photo-1620553967747-50fdadc4b606?w=1200&q=80&auto=format&fit=crop",
  saraFull:   "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=900&q=80&auto=format&fit=crop",
};

const EVENTS = [
  { id:"pool",   title:"Pool Day",        venue:"Cyan Beach Club",     area:"Jiyeh",       date:"Sun · 25 May",  time:"14:00",  img:IMG.beachClub,  type:"Beach",      seats:20, applied:137, badge:"Open" },
  { id:"sound",  title:"Sound Bath",      venue:"Pyrite Mar Mikhael",  area:"Mar Mikhael", date:"Fri · 23 May",  time:"23:00",  img:IMG.club,       type:"Club",       seats:30, applied:212, badge:"24h left" },
  { id:"tasting",title:"Chef Tasting",    venue:"Em Sherif Café",      area:"Achrafieh",   date:"Sat · 24 May",  time:"20:00",  img:IMG.restaurant, type:"Restaurant", seats:12, applied:88,  badge:"Closing" },
  { id:"sunset", title:"Rooftop Sundown", venue:"Sporting",            area:"Manara",      date:"Sat · 24 May",  time:"18:30",  img:IMG.pool,       type:"Pool",       seats:25, applied:154, badge:"" },
  { id:"loungenight", title:"Late Lounge", venue:"Centrale",          area:"Saifi",       date:"Fri · 23 May",  time:"22:00",  img:IMG.lounge,     type:"Lounge",     seats:18, applied:101, badge:"" },
];

/* ========== Icon helper (lucide) ========== */
function Icon({ name, size=18, stroke=1.5, className="" }){
  const ref = useRef(null);
  useEffect(()=>{
    if(window.lucide && ref.current){
      ref.current.innerHTML = "";
      const i = document.createElement("i");
      i.setAttribute("data-lucide", name);
      i.style.width = size+"px"; i.style.height = size+"px";
      ref.current.appendChild(i);
      window.lucide.createIcons({ attrs: { "stroke-width": stroke } });
    }
  }, [name, size, stroke]);
  return <span ref={ref} className={"inline-flex "+className} style={{width:size,height:size}}/>;
}

/* ========== status bar / island / home indicator ========== */
function StatusBar(){
  return (
    <>
      <div className="island"/>
      <div className="statusbar">
        <span>9:41</span>
        <span className="flex items-center gap-1.5">
          <span style={{fontSize:11}}>●●●●</span>
          <span style={{fontSize:11}}>5G</span>
          <Icon name="battery-full" size={16} stroke={1.5}/>
        </span>
      </div>
    </>
  );
}
function HomeIndicator(){
  return (
    <div className="absolute bottom-2 left-0 right-0 flex justify-center z-50 pointer-events-none">
      <div className="w-32 h-1 rounded-full" style={{background:"var(--ink)", opacity:.7}}/>
    </div>
  );
}

/* ========== PhoneScreen wrapper: status bar + scrolling content + sticky tab bar ========== */
function PhoneScreen({ children, tab, onTab, fullBleed=false }){
  return (
    <div className="absolute inset-0 anim-fade" style={{background:"var(--bg)"}}>
      <StatusBar/>
      <div className="absolute inset-0 noscroll overflow-y-auto" style={{paddingBottom: tab ? 88 : 0}}>
        {children}
      </div>
      {tab && <TabBar active={tab} onChange={onTab}/>}
      <HomeIndicator/>
    </div>
  );
}

/* ========== tab bar ========== */
function TabBar({ active, onChange }){
  const items = [
    { id:"home",    label:"Tonight", icon:"sparkle" },
    { id:"explore", label:"Index",   icon:"compass" },
    { id:"mylist",  label:"My List", icon:"bookmark" },
    { id:"profile", label:"Me",      icon:"user"   },
  ];
  return (
    <div className="tabbar">
      {items.map(it=>(
        <button key={it.id} onClick={()=>onChange(it.id)} className={"press "+(active===it.id?"active":"")}>
          <Icon name={it.icon} size={18} stroke={1.4}/>
          <span>{it.label}</span>
          <span className="dot"/>
        </button>
      ))}
    </div>
  );
}

/* ========== 01 — HOME ========== */
function ScreenHome({ tab, onTab, onPickEvent }){
  const featured = EVENTS[0];
  const tonight  = [EVENTS[1], EVENTS[4]];
  return (
    <PhoneScreen tab={tab} onTab={onTab}>
      <div className="px-5 pt-[60px] pb-3 flex items-center justify-between">
        <div>
          <div className="stamp">The List · No. 048</div>
          <div className="font-medium text-[14px] mt-1" style={{color:"var(--ink-2)"}}>Saturday · 24.05</div>
        </div>
        <button className="press w-10 h-10 rounded-full border flex items-center justify-center" style={{borderColor:"var(--line-2)"}}>
          <Icon name="search" size={16} stroke={1.4}/>
        </button>
      </div>

      <div className="hr-2 mx-5 mb-5"/>

      {/* Featured */}
      <div className="px-5">
        <button className="press w-full text-left rounded-[18px] overflow-hidden relative grain" style={{height:380, background:"var(--bg-elev)"}} onClick={()=>onPickEvent(featured)}>
          <img src={featured.img} className="absolute inset-0 w-full h-full object-cover" alt=""/>
          <div className="absolute inset-0" style={{background:"linear-gradient(180deg, rgba(10,10,10,.25) 0%, rgba(10,10,10,0) 35%, rgba(10,10,10,.9) 100%)"}}/>
          <div className="absolute top-3 left-3 px-2 py-1 rounded-full chip-ice text-[10px] uppercase tracking-[.22em] font-medium">{featured.badge}</div>
          <div className="absolute bottom-4 left-4 right-4 text-[var(--ink)]" style={{color:"#F5F1EA"}}>
            <div className="font-black font-display-l text-[40px] leading-[0.92] tracking-tight">{featured.title}</div>
            <div className="flex items-center gap-2 mt-3">
              <span className="text-[12px]">{featured.venue}</span>
              <span style={{color:"rgba(245,241,234,.5)"}}>·</span>
              <span className="text-[12px] font-mono">{featured.date}</span>
            </div>
            <div className="flex items-center justify-between mt-4">
              <div>
                <span className="font-mono text-[18px]" style={{color:"var(--ice)"}}>{featured.seats}</span>
                <span className="text-[11px] ml-1" style={{color:"rgba(245,241,234,.6)"}}>seats · {featured.applied} applied</span>
              </div>
              <div className="px-3 py-1.5 rounded-full chip-ice text-[10px] uppercase tracking-[.22em] font-medium">Tap to view</div>
            </div>
          </div>
        </button>
      </div>

      {/* Also tonight */}
      <div className="px-5 pt-7 pb-3 flex items-center gap-3">
        <span className="stamp">Also tonight</span>
        <div className="flex-1 h-px" style={{background:"var(--line-2)"}}/>
        <span className="text-[11px] font-mono" style={{color:"var(--ink-mute)"}}>{tonight.length} rooms open</span>
      </div>
      <div className="px-5 space-y-3 stagger">
        {tonight.map((e,i)=>(
          <button key={e.id} onClick={()=>onPickEvent(e)} style={{background:"var(--bg-elev)","--i":i}} className="press w-full flex gap-3 items-center text-left p-3 rounded-[14px]">
            <img src={e.img} className="w-16 h-20 rounded-[10px] object-cover" alt=""/>
            <div className="flex-1 min-w-0">
              <div className="stamp">{e.type}</div>
              <div className="font-medium text-[15px] mt-0.5 truncate">{e.title}</div>
              <div className="text-[11px]" style={{color:"var(--ink-mute)"}}>{e.venue} · {e.area}</div>
              <div className="flex items-center gap-2 mt-1.5">
                <span className="font-mono text-[11px]" style={{color:"var(--ice)"}}>{e.seats} seats</span>
                <span style={{color:"var(--ink-mute)"}}>·</span>
                <span className="font-mono text-[11px]" style={{color:"var(--ink-mute)"}}>{e.applied} applied</span>
              </div>
            </div>
            <Icon name="arrow-right" size={16} stroke={1.4} className="opacity-50"/>
          </button>
        ))}
      </div>

      <div className="h-8"/>
    </PhoneScreen>
  );
}

/* ========== Filter sheet (Explore overlay) ========== */
function FilterSheet({ open, onClose, advFilters, setAdvFilters }){
  if(!open) return null;
  const verticals = ["Beach","Club","Restaurant","Lounge","Gym","Rooftop"];
  const distances = ["< 5 km","5 – 15 km","15 – 30 km","Beirut + Mount"];
  const timings = ["Tonight","This week","Anytime"];

  const toggleVert = (v) => setAdvFilters({
    ...advFilters,
    verticals: advFilters.verticals.includes(v)
      ? advFilters.verticals.filter(x=>x!==v)
      : [...advFilters.verticals, v]
  });

  return (
    <>
      <div onClick={onClose} className="absolute inset-0 z-40 sheet-backdrop" style={{background:"rgba(10,10,10,.55)", backdropFilter:"blur(4px)"}}/>
      <div className="absolute left-0 right-0 bottom-0 z-50 sheet rounded-t-[24px] px-5 pt-4 pb-7" style={{background:"var(--bg)", borderTop:"1px solid var(--line-2)"}}>
        <div className="w-10 h-1 rounded-full mx-auto mb-5" style={{background:"var(--ink-mute)", opacity:.4}}/>

        <div className="flex items-center justify-between mb-5">
          <div className="font-black text-[22px] leading-none">Refine the index.</div>
          <button onClick={onClose} className="press w-8 h-8 rounded-full flex items-center justify-center" style={{background:"var(--bg-elev)"}}>
            <Icon name="x" size={14} stroke={1.5}/>
          </button>
        </div>

        <div className="stamp mb-2">Vertical</div>
        <div className="flex flex-wrap gap-1.5 mb-5">
          {verticals.map(v=>{
            const on = advFilters.verticals.includes(v);
            return (
              <button key={v} onClick={()=>toggleVert(v)} className="press px-3 h-8 rounded-full text-[12px]" style={on ? {background:"var(--ink)", color:"var(--bg)"} : {border:"1px solid var(--line-2)", color:"var(--ink)"}}>
                {v}
              </button>
            );
          })}
        </div>

        <div className="stamp mb-2">Distance</div>
        <div className="flex flex-wrap gap-1.5 mb-5">
          {distances.map(d=>{
            const on = advFilters.distance === d;
            return (
              <button key={d} onClick={()=>setAdvFilters({...advFilters, distance: on ? null : d})} className="press px-3 h-8 rounded-full text-[12px]" style={on ? {background:"var(--ice)", color:"var(--ice-ink)"} : {border:"1px solid var(--line-2)", color:"var(--ink)"}}>
                {d}
              </button>
            );
          })}
        </div>

        <div className="stamp mb-2">When</div>
        <div className="flex gap-1.5 mb-6">
          {timings.map(t=>{
            const on = advFilters.timing === t;
            return (
              <button key={t} onClick={()=>setAdvFilters({...advFilters, timing: t})} className={"press flex-1 h-10 rounded-[12px] text-[12px] uppercase tracking-[.16em]"} style={on ? {background:"var(--ink)", color:"var(--bg)"} : {border:"1px solid var(--line-2)", color:"var(--ink)"}}>
                {t}
              </button>
            );
          })}
        </div>

        <div className="flex gap-2">
          <button onClick={()=>setAdvFilters({ verticals:[], distance:null, timing:"Tonight" })} className="press flex-1 h-12 rounded-full text-[12px] uppercase tracking-[.18em]" style={{border:"1px solid var(--line-2)", color:"var(--ink)"}}>
            Reset
          </button>
          <button onClick={onClose} className="press flex-[2] h-12 rounded-full text-[13px] uppercase tracking-[.18em] font-medium" style={{background:"var(--ice)", color:"var(--ice-ink)"}}>
            Show rooms
          </button>
        </div>
      </div>
    </>
  );
}

/* ========== 02 — EXPLORE ========== */
function ScreenExplore({ tab, onTab, onPickEvent }){
  const [filter, setFilter] = useState("all");
  const [sheetOpen, setSheetOpen] = useState(false);
  const [advFilters, setAdvFilters] = useState({ verticals:[], distance:null, timing:"Tonight" });
  const days = [
    { d:"23", w:"Fri" }, { d:"24", w:"Sat" }, { d:"25", w:"Sun", active:true }, { d:"26", w:"Mon" }, { d:"27", w:"Tue" }, { d:"28", w:"Wed" }
  ];
  const filters = ["all","beach","club","restaurant","lounge"];

        <div className="stamp picked-stagger" style={{color:"rgba(245,241,234,.7)", animationDelay:"0ms"}}>The List · invitation</div>

        <div className="flex-1 flex flex-col justify-center items-center text-center -mt-6">
          <div className="w-[180px] h-[180px] rounded-full flex items-center justify-center pulse-ice ring-pop" style={{background:"var(--ice)", color:"var(--ice-ink)", animationDelay:"120ms"}}>
            <div className="font-black text-[48px] leading-none">You're<br/>in.</div>
          </div>
          <div className="font-black font-display-l text-[34px] leading-[0.95] mt-10 tracking-tight picked-stagger" style={{animationDelay:"680ms"}}>{e.title}</div>
          <div className="text-[13px] mt-2 opacity-75 picked-stagger" style={{animationDelay:"820ms"}}>{e.venue} · {e.date} · {e.time}</div>

          <div className="mt-8 px-4 py-3 rounded-[12px] picked-stagger" style={{background:"rgba(245,241,234,.08)", border:"1px solid rgba(245,241,234,.15)", animationDelay:"960ms"}}>
            <div className="stamp" style={{color:"rgba(245,241,234,.65)"}}>Confirm within</div>
            <div className="font-black text-[28px] font-mono mt-0.5" style={{color:"var(--ice)"}}>23 : 59 : 47</div>
          </div>
        </div>

        <div className="flex flex-col gap-3 picked-stagger" style={{animationDelay:"1120ms"}}>
          <button onClick={onConfirm} className="press w-full h-[58px] rounded-full font-medium text-[15px] uppercase tracking-[.2em]" style={{background:"var(--ice)", color:"var(--ice-ink)"}}>
            Confirm my seat
          </button>
          <button onClick={onLater} className="press w-full h-[58px] rounded-full font-medium text-[13px] uppercase tracking-[.2em]" style={{background:"transparent", color:"rgba(245,241,234,.7)", border:"1px solid rgba(245,241,234,.2)"}}>
            Decline
          </button>
        </div>
      </div>
      <HomeIndicator/>
    </div>
  );
}

/* ========== 00 — ONBOARDING ========== */
function ScreenOnboard({ step, setStep, onComplete }){
  const [phone, setPhone] = useState("");
  const [handle, setHandle] = useState("");
  const canSubmit = phone.length >= 6 && handle.length >= 2;

  const submit = () => {
    setStep('reviewing');
    setTimeout(() => setStep('tier-reveal'), 2800);
  };

  if (step === 'phone') return (
    <div className="absolute inset-0 anim-fade" style={{background:"var(--bg)"}}>
      <StatusBar/>
      <div className="absolute inset-0 flex flex-col px-7 pt-[110px] pb-10">
        <div className="stamp">The List · No. 048</div>
        <div className="font-black font-display-l text-[44px] leading-[.95] tracking-tight mt-3">Apply for<br/>access.</div>
        <div className="text-[13px] mt-3 max-w-[280px]" style={{color:"var(--ink-2)"}}>By invitation only. We review every profile manually. Approval typically takes 24 hours.</div>

        <div className="mt-10 space-y-5">
          <div>
            <div className="stamp mb-2">Phone</div>
            <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+961 71 000 000" className="w-full h-12 px-3 rounded-[12px] text-[15px]" style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}/>
          </div>
          <div>
            <div className="stamp mb-2">Instagram handle</div>
            <div className="flex h-12 rounded-[12px] overflow-hidden" style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)"}}>
              <div className="px-3 flex items-center text-[15px]" style={{color:"var(--ink-mute)"}}>@</div>
              <input value={handle} onChange={e=>setHandle(e.target.value)} placeholder="capriottisara" className="flex-1 bg-transparent text-[15px] pr-3 focus:outline-none" style={{color:"var(--ink)"}}/>
            </div>
          </div>
        </div>

        <div className="flex-1"/>

        <button onClick={submit} disabled={!canSubmit} className="press w-full h-[58px] rounded-full font-medium text-[14px] uppercase tracking-[.2em]" style={{background: canSubmit ? "var(--ice)" : "var(--bg-elev2)", color: canSubmit ? "var(--ice-ink)" : "var(--ink-mute)"}}>
          Apply for access
        </button>
        <div className="text-center text-[11px] mt-3" style={{color:"var(--ink-mute)"}}>No password. We verify through your Instagram.</div>
      </div>
      <HomeIndicator/>
    </div>
  );

  if (step === 'reviewing') return (
    <div className="absolute inset-0 anim-fade" style={{background:"#0A0A0A", color:"#F5F1EA"}}>
      <StatusBar/>
      <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-7">
        <div className="w-[160px] h-[160px] rounded-full border-2 flex items-center justify-center" style={{borderColor:"rgba(245,241,234,.2)"}}>
          <div className="w-[120px] h-[120px] rounded-full border-2 spin" style={{borderColor:"rgba(245,241,234,.3)", borderTopColor:"#F5F1EA"}}/>
        </div>
        <div className="font-black font-display-l text-[28px] mt-10 tracking-tight">Reviewing<br/>your profile.</div>
        <div className="text-[13px] mt-3 opacity-70 max-w-[260px]">@{handle || "your-handle"} is being checked. Most decisions land within 24 hours.</div>
      </div>
      <HomeIndicator/>
    </div>
  );

  // tier-reveal
  return (
    <div className="absolute inset-0 anim-fade" style={{background:"#0A0A0A", color:"#F5F1EA"}}>
      <StatusBar/>
      <div className="absolute inset-0 flex flex-col px-7 pt-[110px] pb-10">
        <div className="stamp picked-stagger" style={{color:"rgba(245,241,234,.7)", animationDelay:"0ms"}}>The List · invitation</div>

        <div className="flex-1 flex flex-col justify-center items-center text-center">
          <div className="ring-pop w-[180px] h-[180px] rounded-full flex items-center justify-center pulse-ice" style={{background:"var(--ice)", color:"var(--ice-ink)", animationDelay:"120ms"}}>
            <div className="font-black text-[36px] leading-none">Tier<br/>One.</div>
          </div>
          <div className="font-black font-display-l text-[34px] leading-[.95] mt-10 tracking-tight picked-stagger" style={{animationDelay:"680ms"}}>You're<br/>on the list.</div>
          <div className="text-[13px] mt-3 opacity-80 max-w-[280px] picked-stagger" style={{animationDelay:"820ms"}}>Your audience fits the rooms. Tier reviews happen quarterly.</div>
        </div>

        <button onClick={onComplete} className="press w-full h-[58px] rounded-full font-medium text-[14px] uppercase tracking-[.2em] picked-stagger" style={{background:"var(--ice)", color:"var(--ice-ink)", animationDelay:"1100ms"}}>
          Enter The List
        </button>
      </div>
      <HomeIndicator/>
    </div>
  );
}

/* ========== APP — navigation state ========== */
function App(){
  const [onboardStep, setOnboardStep] = useState("phone"); // phone | reviewing | tier-reveal | done
  const [screen, setScreen] = useState("home");           // home | explore | detail | mylist | profile | picked
  const [tab, setTab] = useState("home");
  const [currentEvent, setCurrentEvent] = useState(null);
  const [applyState, setApplyState] = useState("idle");   // idle | submitting | submitted
  const [confirmedEvent, setConfirmedEvent] = useState(null);
  const [light, setLight] = useState(false);

  useEffect(() => {
    document.documentElement.classList.toggle('light', light);
  }, [light]);

  const goTab = (id) => {
    setTab(id);
    if (id === "home")    setScreen("home");
    if (id === "explore") setScreen("explore");
    if (id === "mylist")  setScreen("mylist");
    if (id === "profile") setScreen("profile");
    setApplyState("idle");
  };

  const pickEvent = (e) => {
    setCurrentEvent(e);
    setApplyState("idle");
    setScreen("detail");
  };

  const onApply = () => {
    setApplyState("submitting");
    setTimeout(() => setApplyState("submitted"), 1400);
    setTimeout(() => setScreen("picked"), 2200);
  };

  const onConfirmPick = () => {
    setConfirmedEvent(currentEvent);
    setScreen("mylist");
    setTab("mylist");
  };

  const onDeclinePick = () => {
    setScreen("detail");
  };

  const skipOnboarding = () => setOnboardStep("done");
  const onboardActive = onboardStep !== "done";

  return (
    <div className="min-h-screen w-full flex flex-col items-center pt-20 pb-24">
      <button className="theme-toggle" onClick={() => setLight(l => !l)}>
        <span className="dot"></span>
        {light ? 'Light' : 'Dark'} · switch
      </button>
      {onboardActive && (
        <button className="theme-toggle" style={{right:140}} onClick={skipOnboarding}>
          Skip onboarding
        </button>
      )}

      <div className="mb-8 text-center">
        <div className="stamp" style={{color:"var(--ink-mute)"}}>The List · Influencer side · Prototype v0.2</div>
        <div className="font-black text-[28px] leading-none mt-2">Tap through Sara's flow.</div>
        <div className="text-[12px] mt-2" style={{color:"var(--ink-mute)"}}>{onboardActive ? "Onboarding first. Fill the form to be reviewed." : "Tap an event → Apply → wait for the venue to pick you."}</div>
      </div>

      <div className="iphone">
        <div className="iphone-screen">
          {onboardActive && <ScreenOnboard step={onboardStep} setStep={setOnboardStep} onComplete={skipOnboarding}/>}
          {!onboardActive && screen === "home"    && <ScreenHome    tab={tab} onTab={goTab} onPickEvent={pickEvent}/>}
          {!onboardActive && screen === "explore" && <ScreenExplore tab={tab} onTab={goTab} onPickEvent={pickEvent}/>}
          {!onboardActive && screen === "detail"  && <ScreenEventDetail event={currentEvent} applyState={applyState} onBack={()=>setScreen(tab==="explore"?"explore":"home")} onApply={onApply}/>}
          {!onboardActive && screen === "mylist"  && <ScreenMyEvents tab={tab} onTab={goTab} confirmedEvent={confirmedEvent}/>}
          {!onboardActive && screen === "profile" && <ScreenProfile tab={tab} onTab={goTab}/>}
          {!onboardActive && screen === "picked"  && <ScreenPicked event={currentEvent} onConfirm={onConfirmPick} onLater={onDeclinePick}/>}
        </div>
      </div>

      <div className="mt-8 text-center max-w-[420px]">
        <div className="stamp mb-2" style={{color:"var(--ink-mute)"}}>How to use</div>
        <div className="text-[12px]" style={{color:"var(--ink-2)"}}>
          {onboardActive
            ? "Type anything in the two fields, hit Apply for access. Watch the review animation. Tap Enter The List on the tier reveal."
            : "Tap any event card, hit Apply. The button shows a loading state, then “You're in” slides up with the tier ring. Confirm → lands in My List. Hit the Filters pill on Index for the bottom sheet."}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
