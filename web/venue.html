<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The List · Venue</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>

<style>
  :root{
    --bg:        #0A0A0A;
    --bg-elev:   #141414;
    --bg-elev2:  #1C1C1C;
    --ink:       #F5F1EA;
    --ink-2:     #F5F1EA;
    --ink-mute:  #F5F1EA;
    --line:      rgba(245,241,234,0.10);
    --line-2:    rgba(245,241,234,0.18);
    --ice:       #9FD8E8;
    --ice-dim:   #6FB5C9;
    --ice-ink:   #0A0A0A;
    --page:      #050505;
  }
  html.light{
    --bg:        #FFFFFF;
    --bg-elev:   #F5F5F5;
    --bg-elev2:  #EAEAEA;
    --ink:       #0A0A0A;
    --ink-2:     #0A0A0A;
    --ink-mute:  #0A0A0A;
    --line:      rgba(10,10,10,0.08);
    --line-2:    rgba(10,10,10,0.14);
    --ice:       #26768F;
    --ice-dim:   #2C7A92;
    --ice-ink:   #FFFFFF;
    --page:      #FAFAFA;
  }
  html, body {
    background: var(--page);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }
  /* One family across the app: Plus Jakarta Sans. Headers just go bolder (800);
     everything else inherits the body weight. No second family. */
  .font-black,
  .font-display {
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
    font-weight: 800;
    letter-spacing: -0.015em;
  }
  .font-display-l {
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
    font-weight: 800;
    letter-spacing: -0.025em;
  }
  /* font-mono = legacy class for numbers/timers. One family across the app, so
     numbers read exactly like the body text — no monospace, no tabular fixed-width.
     Doubled selector (.font-mono.font-mono) so it beats Tailwind CDN's own .font-mono
     utility, which otherwise forces a system monospace stack. Weight inherits
     (bold only where .font-black / .font-display is also applied). */
  .font-mono.font-mono {
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
  }

  /* hide scrollbars inside phone screens */
  .noscroll::-webkit-scrollbar { display:none; }
  .noscroll { scrollbar-width: none; }

  /* iphone bezel */
  .iphone {
    width: 393px; height: 852px;
    border-radius: 54px;
    padding: 11px;
    background: linear-gradient(140deg,#2a2722 0%, #0c0a08 45%, #1d1a16 100%);
    box-shadow:
      inset 0 0 0 1.5px #3a3631,
      inset 0 0 0 3px #0a0807,
      0 60px 80px -40px rgba(0,0,0,.9),
      0 30px 60px -30px rgba(0,0,0,.6);
    position: relative;
  }
  .iphone-screen {
    width: 100%; height: 100%; border-radius: 43px;
    overflow: hidden; position: relative; background: var(--bg);
    isolation: isolate;
  }
  .island { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#000; border-radius:20px; z-index:50; }

  .statusbar { position:absolute; top:0; left:0; right:0; height:54px; padding: 16px 28px 0; display:flex; justify-content:space-between; align-items:flex-start; z-index:40; font-family:'Plus Jakarta Sans', sans-serif; font-weight:600; font-variant-numeric: tabular-nums; font-size:14px; color: var(--ink); pointer-events:none; }
  .statusbar svg { width: 16px; height: 16px; }

  .tabbar {
    position:absolute; left:0; right:0; bottom:0; height: 88px;
    padding: 12px 18px 30px;
    display:grid; grid-template-columns:repeat(4,1fr); gap: 4px;
    background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,.72) 45%, rgba(10,10,10,.92) 100%);
    backdrop-filter: blur(22px) saturate(1.3);
    -webkit-backdrop-filter: blur(22px) saturate(1.3);
    z-index: 30;
    border-top: 1px solid var(--line);
    box-shadow: 0 -12px 34px -22px rgba(159,216,232,.35);
  }
  html.light .tabbar {
    background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.72) 45%, rgba(255,255,255,.92) 100%);
  }
  .tabbar button {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px; color: var(--ink-mute);
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 4px 0; border-radius: 14px;
    transition: color .15s;
    background: transparent; border: 0; cursor: pointer;
  }
  .tabbar button.active { color: var(--ink); }
  .tabbar button.active svg { color: var(--ice); filter: drop-shadow(0 0 8px rgba(159,216,232,.7)); }

  .hr { height: 1px; background: var(--line); }
  .hr-2 { height: 1px; background: var(--line-2); }

  .stamp { font-family:'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); }
  .smallcaps { text-transform: uppercase; letter-spacing: 0.22em; font-size: 10px; font-weight: 500; }
  /* Calmer section marker — breaks the uniform uppercase-tracked-eyebrow cadence.
     Used for section dividers; .stamp stays for true value labels (When/Doors/Seats). */
  .section-label { font-family:'Plus Jakarta Sans', ui-sans-serif, system-ui; font-weight: 700; font-size: 14px; letter-spacing: normal; color: var(--ink-2); }

  .chip-ice { background: var(--ice); color: var(--ice-ink); }
  .chip-outline { border: 1px solid var(--line-2); color: var(--ink); }

  .press { transition: transform .12s ease, opacity .12s ease, background .2s, border-color .2s, box-shadow .2s; cursor: pointer; }
  @media (hover:hover){ .press:hover { opacity: .96; } }
  .press:active { transform: scale(.97); opacity: .85; }

  .vt { writing-mode: vertical-rl; transform: rotate(180deg); }

  /* film grain */
  .grain::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: overlay;
    pointer-events: none;
  }

  .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(159,216,232,.04), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(159,216,232,.025), transparent 60%),
      var(--page);
  }
  html.light .page-bg {
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(111,181,201,.10), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(111,181,201,.05), transparent 60%),
      var(--page);
  }

  .theme-toggle {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display:flex; align-items:center; gap:8px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--line-2);
    color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .theme-toggle:hover { border-color: var(--ice); color: var(--ice); }
  .theme-toggle .dot { width:6px; height:6px; border-radius:50%; background: var(--ice); }

  @keyframes pulseIce {
    0% { box-shadow: 0 0 0 0 rgba(159,216,232,.5); }
    100% { box-shadow: 0 0 0 28px rgba(159,216,232,0); }
  }
  .pulse-ice { animation: pulseIce 1.8s cubic-bezier(.4,.2,.2,1) infinite; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .anim-up { animation: slideUp .5s cubic-bezier(.2,.7,.2,1); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .anim-fade { animation: fadeIn .35s ease; }

  /* Stagger entrance for list children. Each child sets style={{"--i": index}}. */
  .stagger > * { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    @keyframes staggerUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .stagger > * {
      animation: staggerUp .45s ease-out both;
      animation-delay: calc(var(--i, 0) * 60ms);
    }
  }

  /* Picked screen — ring scale-in + content stagger */
  @keyframes ringPop {
    0%   { transform: scale(.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pickedFadeUp {
    from { transform: translateY(14px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .ring-pop { animation: ringPop .8s cubic-bezier(.2,.7,.2,1) backwards; }
  .picked-stagger { animation: pickedFadeUp .55s ease-out backwards; }

  /* Filter sheet — backdrop dim + sheet slide up */
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes dimIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .sheet-backdrop { animation: dimIn .25s ease; }
  .sheet { animation: sheetIn .35s cubic-bezier(.2,.7,.2,1); }

  /* Submit spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin .9s linear infinite; }

  /* ===== polish pass: glass depth + restrained ice glow ===== */
  /* frosted glass for top controls */
  .glass {
    background: rgba(20,20,20,.5) !important;
    backdrop-filter: blur(16px) saturate(1.3);
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
    border: 1px solid rgba(245,241,234,.12) !important;
  }
  html.light .glass {
    background: rgba(255,255,255,.55) !important;
    border-color: rgba(10,10,10,.1) !important;
  }
  /* translucent black cards: 1px glass border + softer shadow */
  .card {
    /* Flat-At-Rest: resting cards are NOT glass. Translucent fill + hairline +
       soft shadow only. Blur is reserved for genuinely-floating surfaces. */
    background: rgba(26,26,26,.66);
    border: 1px solid rgba(245,241,234,.08);
    box-shadow: 0 16px 36px -24px rgba(0,0,0,.9);
    transition: border-color .2s, box-shadow .2s, transform .12s;
  }
  html.light .card {
    /* #7 — firmer edge so cards read as objects on white, not flat panels. */
    background: rgba(255,255,255,.78);
    border-color: rgba(10,10,10,.12);
    box-shadow: 0 12px 30px -22px rgba(10,10,10,.30);
  }
  @media (hover:hover){ button.card:hover, .card.press:hover { border-color: rgba(159,216,232,.35); } }
  @media (hover:hover){ html.light button.card:hover, html.light .card.press:hover { border-color: rgba(38,118,143,.40); } }
  /* ice glow — active + pressed states only */
  .glow-ice { box-shadow: 0 0 0 1px rgba(159,216,232,.4), 0 0 20px -4px rgba(159,216,232,.5); }
  .press.glow-primary:active { box-shadow: 0 0 26px -2px rgba(159,216,232,.65); }
  @media (hover:hover){ .glow-primary:hover { box-shadow: 0 0 24px -4px rgba(159,216,232,.55); } }
  /* #7 — in light theme, active/press states key off the deep ice (#26768F):
     a tighter ring, not the bright dark-theme halo that looks alien on white. */
  html.light .glow-ice { box-shadow: 0 0 0 1px rgba(38,118,143,.55), 0 3px 12px -5px rgba(38,118,143,.40); }
  html.light .press.glow-primary:active { box-shadow: 0 0 16px -4px rgba(38,118,143,.50); }
  @media (hover:hover){ html.light .glow-primary:hover { box-shadow: 0 5px 16px -6px rgba(38,118,143,.40); } }
  /* ornamental texture — only paints outside the (opaque) phone */
  body::before {
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image: radial-gradient(rgba(159,216,232,.06) 1px, transparent 1px);
    background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(120% 90% at 50% 42%, transparent 320px, #000 760px);
    mask-image: radial-gradient(120% 90% at 50% 42%, transparent 320px, #000 760px);
  }
  html.light body::before { background-image: radial-gradient(rgba(79,168,197,.10) 1px, transparent 1px); }

  .profile-hero-overlay {
    background: linear-gradient(180deg, rgba(10,10,10,.3) 0%, rgba(10,10,10,0) 40%, var(--bg) 100%);
  }
  html.light .profile-hero-overlay {
    background:
      linear-gradient(180deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 36%, rgba(255,255,255,.98) 100%),
      linear-gradient(180deg, rgba(10,10,10,.08) 0%, rgba(10,10,10,0) 28%);
  }
  /* #5 — one canonical "floating control over a photo" recipe. Event Detail
     header buttons and the Profile hero controls share it, so there is a single
     over-image glass, distinct from .glass (which floats over the app bg). */
  .glass-over-image, .profile-glass {
    background: rgba(10,10,10,.46);
    border: 1px solid rgba(245,241,234,.18);
    backdrop-filter: blur(12px) saturate(1.25);
    -webkit-backdrop-filter: blur(12px) saturate(1.25);
  }
  html.light .glass-over-image, html.light .profile-glass {
    background: rgba(255,255,255,.72);
    border-color: rgba(10,10,10,.12);
    box-shadow: 0 12px 28px -22px rgba(10,10,10,.45);
  }
  /* Profile keeps its own text-color contract on top of the shared glass. */
  .profile-glass { color: #F5F1EA; }
  html.light .profile-glass { color: #0A0A0A; }
  .profile-hero-text { color: #F5F1EA; }
  .profile-hero-muted { color: rgba(245,241,234,.72); }
  html.light .profile-hero-text { color: #0A0A0A; }
  html.light .profile-hero-muted { color: rgba(10,10,10,.58); }
  html.light .profile-hero-text .stamp,
  html.light .profile-hero-text .smallcaps { color: rgba(10,10,10,.58) !important; }
</style>
</head>

  // Renders an image cropped to a fixed aspect frame using a stored transform.
  // value: { src, scale, x, y } | null. ratio: e.g. "4/5". Empty state when null.
  function FramedImage({ value, ratio="4/5", className="", empty="No image" }){
    return (
      <div className={"relative overflow-hidden rounded-[14px] "+className}
           style={{aspectRatio:ratio, background:"var(--bg-elev)"}}>
        {value && value.src ? (
          <img src={value.src} alt="" draggable={false}
            style={{position:"absolute", left:"50%", top:"50%",
                    transform:`translate(-50%,-50%) translate(${value.x||0}px,${value.y||0}px) scale(${value.scale||1})`,
                    maxWidth:"none", minWidth:"100%", minHeight:"100%", userSelect:"none"}}/>
        ) : (
          <div className="absolute inset-0 flex items-center justify-center stamp" style={{color:"var(--ink-mute)"}}>{empty}</div>
        )}
      </div>
    );
  }

  // Pick a local file, drag + zoom inside a fixed-aspect frame, return {src,scale,x,y}.
  // No upload, no canvas export — the transform is reused by FramedImage everywhere.
  function ImageCropper({ ratio="4/5", value, onChange, onCancel, label="Position your image" }){
    const [src, setSrc]   = useState(value?.src || null);
    const [scale, setScale] = useState(value?.scale || 1);
    const [pos, setPos]   = useState({ x: value?.x || 0, y: value?.y || 0 });
    const drag = useRef(null);
    const fileRef = useRef(null);

    const pick = (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { setSrc(r.result); setScale(1); setPos({x:0,y:0}); };
      r.readAsDataURL(f);
    };
    const onDown = (e) => { const p = e.touches?e.touches[0]:e; drag.current = { x:p.clientX-pos.x, y:p.clientY-pos.y }; };
    const onMove = (e) => { if(!drag.current) return; const p = e.touches?e.touches[0]:e;
                            setPos({ x:p.clientX-drag.current.x, y:p.clientY-drag.current.y }); };
    const onUp   = () => { drag.current = null; };

    return (
      <div className="flex flex-col gap-4">
        <div className="stamp" style={{color:"var(--ink-mute)"}}>{label}</div>
        <div className="relative overflow-hidden rounded-[14px] mx-auto w-full"
             style={{aspectRatio:ratio, background:"var(--bg-elev)", touchAction:"none"}}
             onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
             onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}>
          {src ? (
            <img src={src} alt="" draggable={false}
              style={{position:"absolute", left:"50%", top:"50%",
                      transform:`translate(-50%,-50%) translate(${pos.x}px,${pos.y}px) scale(${scale})`,
                      maxWidth:"none", minWidth:"100%", minHeight:"100%", userSelect:"none"}}/>
          ) : (
            <button onClick={()=>fileRef.current.click()}
              className="absolute inset-0 flex flex-col items-center justify-center gap-2">
              <Icon name="plus" size={28} stroke={1.4}/>
              <span className="stamp">Choose a file</span>
            </button>
          )}
        </div>
        <input ref={fileRef} type="file" accept="image/*" onChange={pick} style={{display:"none"}}/>
        {src && (
          <div className="flex items-center gap-3">
            <Icon name="magnifying-glass" size={16}/>
            <input type="range" min="1" max="3" step="0.01" value={scale}
                   onChange={e=>setScale(parseFloat(e.target.value))} className="flex-1"/>
            <button onClick={()=>fileRef.current.click()} className="stamp" style={{color:"var(--ice)"}}>Replace</button>
          </div>
        )}
        <div className="flex gap-3">
          <button onClick={onCancel} className="press flex-1 h-[52px] rounded-full text-[12px] uppercase tracking-[.2em]"
                  style={{border:"1px solid var(--line-2)", color:"var(--ink)"}}>Cancel</button>
          <button disabled={!src} onClick={()=>onChange({ src, scale, x:pos.x, y:pos.y })}
                  className="press flex-1 h-[52px] rounded-full text-[12px] uppercase tracking-[.2em]"
                  style={{background: src?"var(--ice)":"var(--bg-elev2)", color: src?"var(--ice-ink)":"var(--ink-mute)"}}>
            Use this
          </button>
        </div>
      </div>
    );
  }

              onClick={() => { if(canCreate){ setGroup({ id:"grp-1", name, logo }); onNext(); } }}
              disabled={!canCreate}
              className={"press w-full h-[52px] rounded-full font-medium text-[14px] uppercase tracking-[.2em] "+(canCreate?"glow-primary":"")}
              style={{
                background: canCreate ? "var(--ice)" : "var(--bg-elev2)",
                color: canCreate ? "var(--ice-ink)" : "var(--ink-mute)"
              }}
            >Create group</button>
            <button
              onClick={() => { setGroup(null); onNext(); }}
              className="press w-full h-[48px] rounded-full text-[12px] uppercase tracking-[.2em]"
              style={{background:"transparent", border:"1px solid var(--line-2)", color:"var(--ink)"}}
            >I'm independent · skip</button>
          </div>
        </div>
        <HomeIndicator/>
      </div>
    );
  }

  /* ========== ScreenOnboardVenue — register venue assets ========== */
  function ScreenOnboardVenue({ venue, setVenue, group, onDone }){
    const [editing, setEditing] = useState(null); // null | "hero" | 0..3

    const canSave = venue.name && venue.name.length >= 2 && venue.heroImage;

    // When editing, show only the cropper full-screen
    if (editing !== null){
      if (editing === "hero"){
        return (
          <div className="absolute inset-0 anim-fade" style={{background:"var(--bg)"}}>
            <StatusBar/>
            <div className="absolute inset-0 flex flex-col px-6 overflow-y-auto noscroll" style={{paddingTop:70, paddingBottom:24}}>
              <ImageCropper
                ratio="4/5"
                value={venue.heroImage}
                label="Venue hero"
                onChange={(v) => { setVenue(p => ({...p, heroImage:v})); setEditing(null); }}
                onCancel={() => setEditing(null)}
              />
            </div>
          </div>
        );
      } else {
        const i = editing;
        return (
          <div className="absolute inset-0 anim-fade" style={{background:"var(--bg)"}}>
            <StatusBar/>
            <div className="absolute inset-0 flex flex-col px-6 overflow-y-auto noscroll" style={{paddingTop:70, paddingBottom:24}}>
              <ImageCropper
                ratio="4/5"
                value={venue.images[i]}
                label={"Photo " + (i + 1)}
                onChange={(v) => { setVenue(p => ({...p, images: p.images.map((im,idx) => idx===i ? v : im)})); setEditing(null); }}
                onCancel={() => setEditing(null)}
              />
            </div>
          </div>
        );
      }
    }

    // Normal form view
    return (
      <div className="absolute inset-0 anim-fade" style={{background:"var(--bg)"}}>
        <StatusBar/>
        <div className="absolute inset-0 flex flex-col" style={{paddingTop:54}}>
          {/* Header */}
          <div className="px-6 pt-6 pb-2 shrink-0">
            <div className="flex items-center gap-3">
              <div className="font-black font-display-l" style={{fontSize:44,lineHeight:.95,letterSpacing:"-.02em",color:"var(--ink)"}}>Venue</div>
              {group && (
                <div className="stamp px-2.5 py-1 rounded-full" style={{border:"1px solid var(--line-2)", color:"var(--ink-mute)"}}>
                  Under {group.name}
                </div>
              )}
            </div>
          </div>

          {/* Scrollable form */}
          <div className="flex-1 overflow-y-auto noscroll px-6 pt-4 pb-4 flex flex-col gap-5">
            {/* Venue name */}
            <div>
              <div className="stamp mb-2">Venue name</div>
              <input
                value={venue.name}
                onChange={e => setVenue(v => ({...v, name:e.target.value}))}
                type="text"
                placeholder="e.g. Skybar"
                className="w-full h-12 px-3 rounded-[12px] text-[15px]"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>

            {/* Type pills */}
            <div>
              <div className="stamp mb-2">Type</div>
              <div className="flex flex-wrap gap-2">
                {VENUE_TYPES.map(t => {
                  const sel = venue.type === t;
                  return (
                    <button
                      key={t}
                      onClick={() => setVenue(v => ({...v, type:t}))}
                      className="press px-4 h-9 rounded-full text-[12px] uppercase tracking-[.18em] font-medium"
                      style={{
                        background: sel ? "var(--ice)" : "transparent",
                        color: sel ? "var(--ice-ink)" : "var(--ink)",
                        border: sel ? "none" : "1px solid var(--line-2)"
                      }}
                    >{t}</button>
                  );
                })}
              </div>
            </div>

            {/* Area pills */}
            <div>
              <div className="stamp mb-2">Area</div>
              <div className="flex flex-wrap gap-2">
                {BEIRUT_AREAS.map(a => {
                  const sel = venue.area === a;
                  return (
                    <button
                      key={a}
                      onClick={() => setVenue(v => ({...v, area:a}))}
                      className="press px-3 h-9 rounded-full text-[11px] uppercase tracking-[.14em] font-medium"
                      style={{
                        background: sel ? "var(--ice)" : "transparent",
                        color: sel ? "var(--ice-ink)" : "var(--ink)",
                        border: sel ? "none" : "1px solid var(--line-2)"
                      }}
                    >{a}</button>
                  );
                })}
              </div>
            </div>

            {/* Description */}
            <div>
              <div className="stamp mb-2">Description</div>
              <textarea
                rows={3}
                value={venue.description}
                onChange={e => setVenue(v => ({...v, description:e.target.value}))}
                placeholder="Tell influencers what makes this venue worth posting."
                className="w-full px-3 py-3 rounded-[12px] text-[15px] resize-none"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>

            {/* Hero image */}
            <div>
              <div className="stamp mb-2">Hero image</div>
              {venue.heroImage ? (
                <div>
                  <FramedImage value={venue.heroImage} ratio="4/5" className="w-full"/>
                  <button
                    onClick={() => setEditing("hero")}
                    className="press mt-2 text-[12px] uppercase tracking-[.18em]"
                    style={{color:"var(--ice)", background:"transparent", border:"none"}}
                  >Replace</button>
                </div>
              ) : (
                <button
                  onClick={() => setEditing("hero")}
                  className="press w-full flex items-center justify-center rounded-[14px]"
                  style={{aspectRatio:"4/5", border:"1px dashed var(--line-2)", background:"transparent", color:"var(--ink-mute)"}}
                >
                  <span className="stamp">+ Add hero</span>
                </button>
              )}
            </div>

            {/* Gallery */}
            <div>
              <div className="stamp mb-1">Venue photos</div>
              <div className="text-[12px] mb-3" style={{color:"var(--ink-mute)"}}>Four photos influencers swipe through.</div>
              <div className="grid grid-cols-2 gap-3">
                {[0,1,2,3].map(i => (
                  venue.images[i] ? (
                    <button
                      key={i}
                      onClick={() => setEditing(i)}
                      className="press rounded-[14px] overflow-hidden"
                      style={{aspectRatio:"4/5", background:"var(--bg-elev)", border:"none", padding:0}}
                    >
                      <FramedImage value={venue.images[i]} ratio="4/5" className="w-full h-full"/>
                    </button>
                  ) : (
                    <button
                      key={i}
                      onClick={() => setEditing(i)}
                      className="press rounded-[14px] flex items-center justify-center"
                      style={{aspectRatio:"4/5", border:"1px dashed var(--line-2)", background:"transparent", color:"var(--ink-mute)"}}
                    >
                      <span className="stamp">+</span>
                    </button>
                  )
                ))}
              </div>
            </div>

            {/* bottom spacer so CTA isn't occluded */}
            <div style={{height:8}}/>
          </div>

          {/* Primary CTA */}
          <div className="shrink-0 px-6 pb-10">
            <button
              onClick={canSave ? onDone : undefined}
              disabled={!canSave}
              className={"press w-full h-[52px] rounded-full font-medium text-[14px] uppercase tracking-[.2em] "+(canSave?"glow-primary":"")}
              style={{
                background: canSave ? "var(--ice)" : "var(--bg-elev2)",
                color: canSave ? "var(--ice-ink)" : "var(--ink-mute)"
              }}
            >Save venue</button>
          </div>
        </div>
        <HomeIndicator/>
      </div>
    );
  }

  /* ========== VenueTabBar — 3-tab frosted bar for the venue shell ========== */
  function VenueTabBar({ tab, onTab }){
    const items = [
      { id:"events",     icon:"calendar",            label:"Events" },
      { id:"applicants", icon:"users",               label:"Applicants" },
      { id:"venue",      icon:"building-storefront", label:"Venue" },
    ];
    return (
      <div className="tabbar" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        {items.map(it => {
          const active = tab === it.id;
          return (
            <button key={it.id} onClick={() => onTab(it.id)} className={"press " + (active ? "active" : "")}>
              <Icon name={it.icon} size={18} stroke={1.4}/>
              <span>{it.label}</span>
            </button>
          );
        })}
      </div>
    );
  }

  /* ========== ScreenStub — placeholder for unbuilt tabs ========== */
  function ScreenStub({ title }){
    return (
      <>
        <StatusBar/>
        <div className="absolute inset-0 flex items-center justify-center" style={{background:"var(--bg)"}}>
          <div className="font-black font-display-l text-[40px]" style={{color:"var(--ink-mute)"}}>{title}</div>
        </div>
        <HomeIndicator/>
      </>
    );
  }

  /* ========== ScreenEvents — Events dashboard (Task 9) ========== */
  function ScreenEvents({ events, venue, onPost, onOpenEvent }){
    const [seg, setSeg] = useState("live");

    const counts = {
      live:  events.filter(e => e.status === "live").length,
      draft: events.filter(e => e.status === "draft").length,
      past:  events.filter(e => e.status === "past").length,
    };

    const segments = [
      { id:"live",  label:"Live",  count: counts.live  },
      { id:"draft", label:"Draft", count: counts.draft },
      { id:"past",  label:"Past",  count: counts.past  },
    ];

    const visible = events.filter(e => e.status === seg);

    function EventStatusPill({ status }){
      if(status === "live")  return <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] uppercase tracking-[.2em] font-medium" style={{background:"var(--ice)", color:"var(--ice-ink)"}}>Live</span>;
      if(status === "draft") return <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] uppercase tracking-[.2em] font-medium" style={{border:"1px solid var(--line-2)", color:"var(--ink)"}}>Draft</span>;
      return <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] uppercase tracking-[.2em] font-medium" style={{background:"var(--bg-elev2)", color:"var(--ink-mute)"}}>Past</span>;
    }

    return (
      <div className="absolute inset-0 flex flex-col" style={{background:"var(--bg)"}}>
        <StatusBar/>

        {/* Header */}
        <div className="shrink-0 px-5 pt-[60px] pb-3">
          <div className="font-black font-display-l text-[40px] leading-none">Events</div>
        </div>
        <div className="hr-2 mx-5 mb-4 shrink-0"/>

        {/* Segmented control */}
        <div className="shrink-0 px-5 mb-4">
          <div className="flex gap-1 p-1 rounded-full" style={{background:"var(--bg-elev)", border:"1px solid var(--line)"}}>
            {segments.map(it => {
              const on = it.id === seg;
              return (
                <button key={it.id} onClick={() => setSeg(it.id)} className="press flex-1 h-9 rounded-full flex items-center justify-center gap-1 text-[10px] uppercase tracking-[.06em] font-medium"
                  style={on ? {background:"var(--ink)", color:"var(--bg)"} : {color:"var(--ink-mute)"}}>
                  <span>{it.label}</span>
                  <span style={{opacity:.65}}>{it.count}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Scrollable event list */}
        <div className="flex-1 overflow-y-auto noscroll px-5 pb-2">
          {visible.length === 0 ? (
            <div className="flex items-center justify-center h-full">
              <span className="stamp" style={{color:"var(--ink-mute)"}}>
                {seg === "live" ? "No live events" : seg === "draft" ? "No drafts" : "No past events"}
              </span>
            </div>
          ) : (
            <div className="flex flex-col gap-3">
              {visible.map(event => (
                <button key={event.id} onClick={() => onOpenEvent(event)}
                  className="press w-full text-left flex items-center gap-3 p-3 rounded-[14px]"
                  style={{background:"var(--bg-elev)", border:"1px solid var(--line)"}}>
                  <FramedImage value={event.heroImage} ratio="4/5" className="w-14 shrink-0"/>
                  <div className="flex-1 min-w-0">
                    <div className="font-black text-[16px] leading-tight truncate">{event.title || "Untitled"}</div>
                    <div className="text-[11px] mt-0.5 truncate" style={{color:"var(--ink-mute)"}}>
                      {event.type}{event.date ? " · " + event.date : ""}{event.time ? " · " + event.time : ""}
                    </div>
                  </div>
                  <div className="shrink-0 flex flex-col items-end gap-1.5">
                    <EventStatusPill status={event.status}/>
                    <span className="stamp text-[10px]" style={{color:"var(--ink-mute)"}}>
                      {event.mix
                        ? "Girls " + event.mix.girls + " · Guys " + event.mix.guys
                        : event.seats + " seats"}
                    </span>
                  </div>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Pinned Post CTA */}
        <div className="shrink-0 px-5 pb-24 pt-3">
          <button onClick={onPost} className="press glow-primary w-full h-[52px] rounded-full font-medium text-[14px] uppercase tracking-[.2em]"
            style={{background:"var(--ice)", color:"var(--ice-ink)"}}>
            Post an event
          </button>
        </div>
      </div>
    );
  }

  /* ========== ScreenApplicants — stub ========== */
  function ScreenApplicants({ events, onReview }){ return <ScreenStub title="Applicants"/>; }

  /* ========== ScreenVenueProfile — stub ========== */
  function ScreenVenueProfile({ venue, group }){ return <ScreenStub title="Venue"/>; }

  /* ========== ScreenPostEvent — 4-step post wizard ========== */
  function ScreenPostEvent({ venue, onPublish, onCancel }){
    const [sub, setSub] = useState("basics"); // basics | seats | image | review
    const [draft, setDraft] = useState(makeEvent({ venueId: venue.id, heroImage: venue.heroImage }));
    const set = (patch) => setDraft(d => ({ ...d, ...patch }));

    if (sub === "basics") {
      const ok = draft.title.length>=2 && draft.date && draft.time;
      return (
        <div className="absolute inset-0 flex flex-col px-5 pt-[64px] pb-24" style={{background:"var(--bg)"}}>
          <StatusBar/>
          <button onClick={onCancel} className="stamp text-left mb-2" style={{color:"var(--ink-mute)"}}>Cancel</button>
          <div className="font-black font-display-l text-[40px]">Post</div>
          <div className="text-[13px] mt-2" style={{color:"var(--ink-2)"}}>Step 1 of 4 · The basics</div>
          <div className="mt-6 space-y-5 flex-1 overflow-y-auto">
            <div>
              <div className="stamp mb-2">Title</div>
              <input
                value={draft.title}
                onChange={e => set({title:e.target.value})}
                type="text"
                placeholder="e.g. Pool Day"
                className="w-full h-12 px-3 rounded-[12px] text-[15px]"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>
            <div>
              <div className="stamp mb-2">Type</div>
              <div className="flex flex-wrap gap-2">
                {VENUE_TYPES.map(t => {
                  const sel = draft.type === t;
                  return (
                    <button
                      key={t}
                      onClick={() => set({type:t})}
                      className="press px-4 h-9 rounded-full text-[12px] uppercase tracking-[.18em] font-medium"
                      style={{
                        background: sel ? "var(--ice)" : "transparent",
                        color: sel ? "var(--ice-ink)" : "var(--ink)",
                        border: sel ? "none" : "1px solid var(--line-2)"
                      }}
                    >{t}</button>
                  );
                })}
              </div>
            </div>
            <div>
              <div className="stamp mb-2">Date</div>
              <input
                value={draft.date}
                onChange={e => set({date:e.target.value})}
                type="text"
                placeholder="Sun · 25 May"
                className="w-full h-12 px-3 rounded-[12px] text-[15px]"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>
            <div>
              <div className="stamp mb-2">Time</div>
              <input
                value={draft.time}
                onChange={e => set({time:e.target.value})}
                type="text"
                placeholder="22:00"
                className="w-full h-12 px-3 rounded-[12px] text-[15px]"
                style={{background:"var(--bg-elev)", border:"1px solid var(--line-2)", color:"var(--ink)"}}
              />
            </div>
          </div>
          <button disabled={!ok} onClick={()=>setSub("seats")}
            className="press w-full h-[58px] rounded-full text-[14px] uppercase tracking-[.2em]"
            style={{background: ok?"var(--ice)":"var(--bg-elev2)", color: ok?"var(--ice-ink)":"var(--ink-mute)"}}>Next</button>
        </div>
      );
    }
    if (sub === "seats") { /* TASK 11 */ }
    if (sub === "image") { /* TASK 12 */ }
    // sub === "review"  /* TASK 12 */
    return null;
  }

  /* ========== APP — onboarding state machine ========== */
  function App(){
    const [step, setStep] = useState("intro");
    // intro | login | onboard-group | onboard-venue | done
    const [light, setLight] = useState(false);
    const [group, setGroup] = useState(null);          // {id,name,logo} | null (independent)
    const [venue, setVenue] = useState(makeVenue());   // venue being registered
    const [events, setEvents] = useState(SEED_EVENTS); // their drops
    const [tab, setTab] = useState("events");          // events | applicants | venue
    const [toast, setToast] = useState(null);
    const toastTimer = useRef(null);

    useEffect(() => { document.documentElement.classList.toggle('light', light); }, [light]);
    const showToast = (msg) => { setToast(msg); if (toastTimer.current) clearTimeout(toastTimer.current); toastTimer.current = setTimeout(()=>setToast(null), 2200); };

    // wrap: page chrome (theme toggle + explanatory card + phone frame + Toast), like index.html's App return
    const wrap = (node) => (
      <div className="min-h-screen w-full flex flex-col items-center pt-20 pb-24">
        <button className="theme-toggle" onClick={() => setLight(l => !l)}><span className="dot"></span>{light ? 'Light' : 'Dark'} · switch</button>
        <div className="mb-8 text-center">
          <div className="stamp" style={{color:"var(--ink-mute)"}}>The List · Venue side · Prototype v0.1</div>
          <div className="font-black text-[28px] leading-none mt-2">Venue flow</div>
        </div>
        <div className="iphone"><div className="iphone-screen">
          {node}
          <Toast msg={toast}/>
        </div></div>
      </div>
    );

    if (step === "intro") return wrap(<ScreenVenueIntro onList={()=>setStep("login")} onLogin={()=>setStep("login")}/>);
    if (step === "login") return wrap(<ScreenVenueLogin onDone={()=>setStep("onboard-group")}/>);
    if (step === "onboard-group") return wrap(<ScreenOnboardGroup group={group} setGroup={setGroup} onNext={()=>setStep("onboard-venue")}/>);
    if (step === "onboard-venue") return wrap(<ScreenOnboardVenue venue={venue} setVenue={setVenue} group={group} onDone={()=>{ setStep("done"); setTab("events"); }}/>);

    const openEvent = (e) => { showToast("Open from the Applicants tab to review"); }; // rewired in Task 15
    const publishEvent = (draft) => { setStep("done"); };
    if (step === "post") return wrap(<ScreenPostEvent venue={venue} onCancel={()=>setStep("done")} onPublish={publishEvent}/>);
    if (step === "done") return wrap(
      <>
        {tab === "events"     && <ScreenEvents events={events} venue={venue} onPost={()=>setStep("post")} onOpenEvent={openEvent}/>}
        {tab === "applicants" && <ScreenApplicants events={events} onReview={openEvent}/>}
        {tab === "venue"      && <ScreenVenueProfile venue={venue} group={group}/>}
        <VenueTabBar tab={tab} onTab={setTab}/>
      </>
    );

    // Generic fallback for steps not yet built (post, review-deck).
    return wrap(
      <>
        <StatusBar/>
        <div className="absolute inset-0 flex items-center justify-center" style={{background:"var(--bg)"}}>
          <div className="font-black font-display-l text-[34px]" style={{color:"var(--ink-mute)"}}>{step}</div>
        </div>
        <HomeIndicator/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
